新增策略任务-轮播任务demo<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新增策略任务 - 轮播任务 Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: #f3f5f7;
      color: #1f2329;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e5e6eb;
      padding: 12px 0;
    }
    .logo {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-weight: 700;
      color: #0f3058;
      border-bottom: 1px solid #f0f1f3;
    }
    .menu-group { margin-top: 8px; }
    .menu-title {
      font-size: 12px;
      color: #86909c;
      padding: 10px 16px 6px;
    }
    .menu-item {
      padding: 9px 18px;
      font-size: 13px;
      color: #4e5969;
      cursor: pointer;
    }
    .menu-item.active {
      background: #e8f3ff;
      color: #165dff;
      border-right: 3px solid #165dff;
      font-weight: 600;
    }
    .main { flex: 1; padding: 18px 20px; }
    .topbar {
      height: 48px;
      border: 1px solid #e5e6eb;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #4e5969;
    }
    .panel {
      background: #fff;
      border: 1px solid #e5e6eb;
      border-radius: 8px;
      padding: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back {
      color: #165dff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    .section {
      border: 1px solid #f0f1f3;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px 12px;
      align-items: center;
    }
    .label {
      color: #4e5969;
      font-size: 13px;
      text-align: right;
    }
    .required::before {
      content: "* ";
      color: #f53f3f;
    }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #165dff;
      box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.12);
    }
    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .strategy-row {
      position: relative;
      margin-top: 10px;
      padding-right: 44px;
    }
    .strategy-wrap {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      border: 1px solid #e5e6eb;
      border-radius: 8px;
      overflow: visible;
    }
    .strategy-index {
      background: #f7f8fa;
      border-right: 1px solid #e5e6eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #4e5969;
      gap: 6px;
      padding: 10px 6px;
      text-align: center;
    }
    .strategy-policy {
      font-size: 12px;
      color: #86909c;
      font-weight: 500;
      line-height: 1.2;
      word-break: break-all;
    }
    .strategy-body {
      position: relative;
      padding: 12px;
    }
    .strategy-side-actions {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .icon-btn {
      width: 24px;
      height: 24px;
      border: 1px solid #b7d1ff;
      background: #f2f7ff;
      color: #165dff;
      border-radius: 4px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
    }
    .icon-btn:hover {
      background: #e8f3ff;
      border-color: #165dff;
    }
    .icon-btn:disabled {
      color: #b7c4db;
      border-color: #d9e4f8;
      background: #f7f9fc;
      cursor: not-allowed;
    }
    .rule-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .rule-tab {
      border: 1px solid #dcdfe6;
      border-radius: 20px;
      background: #fff;
      color: #4e5969;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .rule-tab.active {
      border-color: #165dff;
      background: #e8f3ff;
      color: #165dff;
      font-weight: 600;
    }
    .content-item {
      border: 1px solid #e5e6eb;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fcfdff;
    }
    .content-list {
      margin-top: 10px;
    }
    .content-item.covered {
      border-color: #91caff;
      background: #f0f7ff;
    }
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .ops { display: flex; gap: 6px; }
    button {
      border: 1px solid #dcdfe6;
      background: #fff;
      color: #4e5969;
      border-radius: 4px;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }
    button:hover { border-color: #165dff; color: #165dff; }
    .btn-primary {
      background: #165dff;
      color: #fff;
      border-color: #165dff;
    }
    .btn-primary:hover {
      background: #0e42d2;
      color: #fff;
      border-color: #0e42d2;
    }
    .btn-danger:hover { border-color: #f53f3f; color: #f53f3f; }
    .link-btn {
      border: none;
      background: transparent;
      color: #165dff;
      padding: 0;
      font-size: 12px;
      line-height: 20px;
    }
    .link-btn:hover {
      border: none;
      background: transparent;
      color: #0e42d2;
      text-decoration: underline;
    }
    .link-btn-danger {
      color: #f53f3f;
    }
    .link-btn-danger:hover {
      color: #cb272d;
    }
    .hint {
      font-size: 12px;
      color: #86909c;
      margin-top: 4px;
      line-height: 1.6;
    }
    .rule-panel {
      border: 1px dashed #c9cdd4;
      border-radius: 6px;
      padding: 10px;
      margin-top: 8px;
      background: #fafbfc;
    }
    .group-detail {
      margin-top: 8px;
      border: 1px solid #e5e6eb;
      border-radius: 6px;
      background: #fff;
      padding: 10px 12px;
    }
    .detail-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .group-detail-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px;
      margin-bottom: 8px;
      align-items: flex-start;
    }
    .group-detail-row:last-child { margin-bottom: 0; }
    .group-k {
      font-size: 12px;
      color: #86909c;
      line-height: 22px;
      text-align: right;
    }
    .group-v {
      font-size: 12px;
      color: #4e5969;
      line-height: 22px;
    }
    .content-detail-box {
      margin-top: 10px;
      border: 1px solid #e5e6eb;
      border-radius: 6px;
      background: #fff;
      padding: 10px 12px;
    }
    .code-block {
      margin: 0;
      padding: 8px 10px;
      background: #f7f8fa;
      border: 1px solid #e5e6eb;
      border-radius: 4px;
      font-size: 12px;
      color: #1f2329;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      border: 1px solid #dcdfe6;
      border-radius: 4px;
      padding: 0 8px;
      margin: 0 6px 6px 0;
      background: #fff;
      color: #4e5969;
      white-space: nowrap;
    }
    .periodic-warning {
      margin-top: 6px;
      margin-bottom: 8px;
      padding: 8px 10px;
      border: 1px solid #bfd4ff;
      background: #f2f7ff;
      border-radius: 6px;
      color: #165dff;
      font-size: 12px;
      line-height: 1.5;
    }
    .picker-wrap {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      max-width: 760px;
    }
    .pick-btn {
      border: 1px solid #dcdfe6;
      background: #fff;
      color: #4e5969;
      border-radius: 4px;
      font-size: 12px;
      padding: 2px 8px;
      line-height: 18px;
      cursor: pointer;
    }
    .pick-btn.active {
      border-color: #165dff;
      color: #165dff;
      background: #e8f3ff;
    }
    .pick-btn.quick {
      border-style: dashed;
    }
    .month-range-tools {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
    }
    .mode-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 1px solid #c9cdd4;
      border-radius: 50%;
      color: #86909c;
      font-size: 11px;
      font-weight: 600;
      cursor: help;
      line-height: 1;
      margin-left: 4px;
      background: #fff;
    }
    .mode-tip:hover { color: #165dff; border-color: #165dff; }
    .mode-tip-text {
      position: absolute;
      left: 22px;
      top: -4px;
      min-width: 280px;
      max-width: 360px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #1f2329;
      color: #fff;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.5;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity .15s ease, transform .15s ease;
      z-index: 80;
    }
    .mode-tip:hover .mode-tip-text {
      opacity: 1;
      transform: translateY(0);
    }
    .picker-trigger {
      cursor: pointer;
      background: #fff;
    }
    .range-picker-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .picker-popover {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 60;
      width: 620px;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      display: none;
    }
    .picker-popover.show { display: block; }
    .picker-body {
      display: grid;
      grid-template-columns: 130px 1fr;
      min-height: 240px;
    }
    .picker-quick {
      border-right: 1px solid #f0f1f3;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .quick-item {
      border: 1px solid transparent;
      background: transparent;
      color: #4e5969;
      text-align: left;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    .quick-item:hover {
      border-color: #165dff;
      color: #165dff;
      background: #f2f7ff;
    }
    .switch-helper {
      font-size: 12px;
      font-weight: 400;
      color: #86909c;
      line-height: 1;
    }
    .picker-main {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .picker-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: #4e5969;
    }
    .picker-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #f0f1f3;
    }
    .period-summary {
      display: inline-block;
      min-width: 140px;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #4e5969;
      font-size: 12px;
    }
    .period-picker-panel {
      position: absolute;
      left: 150px;
      top: 34px;
      width: 520px;
      max-height: 220px;
      overflow: auto;
      z-index: 40;
      border: 1px solid #dcdfe6;
      border-radius: 6px;
      padding: 8px;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }
    .inline.periodic-rule-field {
      position: relative;
    }
    .split {
      height: 1px;
      background: #f0f1f3;
      margin: 12px 0;
    }
    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }
    .json {
      background: #111827;
      color: #d1fae5;
      border-radius: 6px;
      font-size: 12px;
      padding: 10px;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid #bfd4ff;
      background: #f2f7ff;
      color: #165dff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    @media (max-width: 1200px) {
      .sidebar { display: none; }
      .main { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">W365 系统后台</div>
      <div class="menu-group">
        <div class="menu-title">菜单导航</div>
        <div class="menu-item">指标看板</div>
        <div class="menu-item">企业管理</div>
        <div class="menu-item">CRM</div>
        <div class="menu-item">订单管理</div>
        <div class="menu-item">运营管理</div>
        <div class="menu-item">策略管理</div>
        <div class="menu-item active">新增策略任务</div>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <span>刘英（运营管理员）</span>
        <span>子策略配置：<strong style="color:#165dff;">投放模式 Demo</strong></span>
      </div>
      <div class="panel">
        <div class="title">
          <a href="#" class="back">返回</a>
          <span>新增策略任务</span>
        </div>

        <section class="section">
          <div class="section-title">基本信息</div>
          <div class="form-grid">
            <div class="label required">任务名称</div>
            <input type="text" id="taskName" value="投放序列轮播任务" />

            <div class="label required">投放位置</div>
            <div class="inline">
              <select style="max-width:220px;">
                <option>PC客户端 / 其他 / PC首页弹窗</option>
              </select>
            </div>

            <div class="label required">生效时间</div>
            <div class="inline">
              <input type="text" id="startTime" value="2026-06-01 00:00:00" style="max-width:220px;" />
              <span>—</span>
              <input type="text" id="endTime" value="2026-06-30 00:00:00" style="max-width:220px;" />
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-title">策略设置</div>

          <div id="strategiesContainer"></div>

          <div class="inline" style="margin-top:10px;">
            <button type="button" id="addStrategyBtn">添加子策略</button>
          </div>
        </section>

        <div class="footer">
          <button type="button">发布到灰度环境</button>
          <button type="button" class="btn-primary">发布到外网环境</button>
        </div>
      </div>
    </main>
  </div>

  <template id="contentTemplate">
    <div class="content-item">
      <div class="content-header">
        <span class="content-title">内容 #1</span>
        <div class="ops">
          <button type="button" data-op="up">上移</button>
          <button type="button" data-op="down">下移</button>
          <button type="button" class="btn-danger" data-op="delete">删除</button>
        </div>
      </div>
      <div class="form-grid" style="grid-template-columns: 140px 1fr;">
        <div class="label required">投放内容</div>
        <div class="inline">
          <select data-field="contentName" style="max-width:360px;">
            <option value="">请选择投放内容</option>
            <option value="内容A-推荐弹窗">内容A-推荐弹窗</option>
            <option value="内容B-权益引导弹窗">内容B-权益引导弹窗</option>
            <option value="内容C-升级转化弹窗">内容C-升级转化弹窗</option>
            <option value="内容D-召回提醒弹窗">内容D-召回提醒弹窗</option>
          </select>
          <button type="button" class="link-btn" data-action="toggle-content-detail">展开详情</button>
        </div>

        <div class="label switch-condition-field required">切换条件</div>
        <div class="inline switch-condition-field">
          <span class="switch-helper">当</span>
          <select data-field="actionType" style="max-width:120px;">
            <option value="hit">命中策略</option>
            <option value="show">展示</option>
            <option value="close">关闭</option>
          </select>
          <span class="switch-helper">达到</span>
          <input type="number" min="1" value="1" data-field="actionCount" style="max-width:90px;" />
          <span class="switch-helper">次后，等待</span>
          <input type="number" min="0" value="0" data-field="waitValue" style="max-width:90px;" />
          <select data-field="waitUnit" style="max-width:90px;">
            <option value="minute">分钟</option>
            <option value="hour">小时</option>
            <option value="day">天</option>
          </select>
          <span class="switch-helper">后切换（0 表示立即切换）</span>
        </div>

        <div class="label split-config-field split-tail-only required">用户尾号</div>
        <select class="split-config-field split-tail-only" data-field="userTail" style="max-width:220px;">
          <option value="all">全部</option>
          <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>

        <div class="label split-config-field split-tail-only required">用户所在企业尾号</div>
        <select class="split-config-field split-tail-only" data-field="companyTail" style="max-width:220px;">
          <option value="all">全部</option>
          <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>

        <div class="label split-config-field split-flow-only required">流量比例（%）</div>
        <input class="split-config-field split-flow-only" type="text" data-field="splitValue" style="max-width:220px;" placeholder="例如：30" />

        <div class="label periodic-rule-field required">投放周期</div>
        <div class="inline periodic-rule-field">
          <select data-field="periodRuleType" style="max-width:120px;">
            <option value="custom_range">指定区间</option>
            <option value="weekly_day">每周-按天</option>
            <option value="weekly_range">每周-按区间</option>
            <option value="monthly_day">每月-按天</option>
            <option value="monthly_range">每月-按区间</option>
          </select>
          <select class="period-range-value" data-field="periodRangeStart" data-period-range-start style="max-width:95px;"></select>
          <span class="period-range-value">～</span>
          <select class="period-range-value" data-field="periodRangeEnd" data-period-range-end style="max-width:95px;"></select>
          <select class="period-day-value" data-field="periodValue" data-period-value style="max-width:180px;"></select>
          <div class="range-picker-wrap period-normal-time">
            <input class="picker-trigger" type="text" readonly data-field="periodTimeRange" data-action="open-time-picker" data-target-field="periodTimeRange" style="max-width:150px;" placeholder="09:00～18:00" />
          </div>
          <div class="range-picker-wrap period-custom-range-value">
            <input class="picker-trigger" type="text" readonly data-field="periodDateRange" data-action="open-date-picker" data-target-field="periodDateRange" style="width:260px;min-width:260px;" placeholder="2026-06-01～2026-06-30" />
            <div class="picker-popover" data-date-picker>
              <div class="picker-body">
                <div class="picker-quick">
                  <button type="button" class="quick-item" data-action="quick-date-range" data-range-preset="today">今天</button>

    function parseTimeToMinutes(text) {
      const match = String(text || "").trim().match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function splitRangeText(text) {
      const raw = String(text || "").trim();
      if (!raw) return [];
      const parts = raw.split(/\s*[～~]\s*/);
      return parts.length === 2 ? parts : [];
    }

    function parseTimeRange(text) {
      const [start, end] = splitRangeText(text);
      if (!start || !end) return [null, null];
      return [parseTimeToMinutes(start), parseTimeToMinutes(end)];
    }

    function buildDaySet(start, end, min, max) {
      const s = Number(start);
      const e = Number(end);
      if (!Number.isInteger(s) || !Number.isInteger(e) || s < min || s > max || e < min || e > max) return [];
      const result = [];
      if (s <= e) {
        for (let i = s; i <= e; i++) result.push(i);
      } else {
        for (let i = s; i <= max; i++) result.push(i);
        for (let i = min; i <= e; i++) result.push(i);
      }
      return result;
    }

    function hasArrayIntersection(a, b) {
      const setB = new Set(b);
      return a.some((v) => setB.has(v));
    }

    function getPeriodicDaySet(content, type) {
      const rule = content.periodRuleType || "weekly_day";
      if (type === "weekly") {
        if (rule === "weekly_range") return buildDaySet(content.periodRangeStart, content.periodRangeEnd, 1, 7);
        if (rule === "weekly_day") return buildDaySet(content.periodValue, content.periodValue, 1, 7);
        return [];
      }
      if (rule === "monthly_range") return buildDaySet(content.periodRangeStart, content.periodRangeEnd, 1, 31);
      if (rule === "monthly_day") return buildDaySet(content.periodValue, content.periodValue, 1, 31);
      return [];
    }

    function parseDateToNumber(text) {
      const match = String(text || "").trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      const d = new Date(`${match[1]}-${match[2]}-${match[3]}T00:00:00`);
      if (Number.isNaN(d.getTime())) return null;
      return Number(`${match[1]}${match[2]}${match[3]}`);
    }

    function parseDateRange(text) {
      const [start, end] = splitRangeText(text);
      if (!start || !end) return [null, null];
      return [parseDateToNumber(start), parseDateToNumber(end)];
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getDateOffset(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return formatDate(d);
    }

    function buildTimeOptionsHtml() {
      const options = [];
      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 30) {
          const t = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
          options.push(`<option value="${t}">${t}</option>`);
        }
      }
      return options.join("");
    }

    function hideAllPickers() {
      strategiesContainer.querySelectorAll(".picker-popover.show").forEach((el) => el.classList.remove("show"));
    }

    function getRuleDimension(rule) {
      if (rule === "custom_range") return "custom_range";
      if (rule.startsWith("weekly")) return "weekly";
      if (rule.startsWith("monthly")) return "monthly";
      return "";
    }

    function getPeriodValueOptions(ruleType) {
      const weeklyDay = [
        { value: "1", label: "周一" }, { value: "2", label: "周二" }, { value: "3", label: "周三" },
        { value: "4", label: "周四" }, { value: "5", label: "周五" }, { value: "6", label: "周六" }, { value: "7", label: "周日" }
      ];
      if (ruleType === "weekly_day") return weeklyDay;
      if (ruleType === "custom_range") return [{ value: "1", label: "-" }];
      return Array.from({ length: 31 }, (_, i) => ({ value: String(i + 1), label: `${i + 1}号` }));
    }

    function getPeriodRangeOptions(ruleType) {
      if (ruleType.startsWith("weekly")) {
        return [
          { value: "1", label: "周一" }, { value: "2", label: "周二" }, { value: "3", label: "周三" },
          { value: "4", label: "周四" }, { value: "5", label: "周五" }, { value: "6", label: "周六" }, { value: "7", label: "周日" }
        ];
      }
      return Array.from({ length: 31 }, (_, i) => ({ value: String(i + 1), label: `${i + 1}号` }));
    }

    function normalizePeriodValue(content) {
      const options = getPeriodValueOptions(content.periodRuleType);
      const values = options.map((item) => item.value);
      if (!values.includes(String(content.periodValue))) {
        content.periodValue = values[0] || "";
      }
    }

    function normalizePeriodRange(content) {
      const options = getPeriodRangeOptions(content.periodRuleType);
      const values = options.map((item) => item.value);
      if (!values.includes(String(content.periodRangeStart))) content.periodRangeStart = values[0] || "";
      if (!values.includes(String(content.periodRangeEnd))) content.periodRangeEnd = values[0] || "";
    }

    function hasTimeOverlap(aStart, aEnd, bStart, bEnd) {
      return aStart < bEnd && bStart < aEnd;
    }

    function resolvePeriodicPriority(contents) {
      const coveredIndexSet = new Set();
      const messages = [];

      for (let i = 0; i < contents.length; i++) {
        for (let j = i + 1; j < contents.length; j++) {
          const a = contents[i];
          const b = contents[j];
          const aType = getRuleDimension(a.periodRuleType || "");
          const bType = getRuleDimension(b.periodRuleType || "");
          if (!aType || !bType || aType !== bType) continue;

          if (aType === "custom_range") {
            const [aDateStart, aDateEnd] = parseDateRange(a.periodDateRange);
            const [bDateStart, bDateEnd] = parseDateRange(b.periodDateRange);
            const [aStart, aEnd] = parseTimeRange(a.periodCustomTimeRange);
            const [bStart, bEnd] = parseTimeRange(b.periodCustomTimeRange);
            const validRange = aDateStart !== null && aDateEnd !== null && bDateStart !== null && bDateEnd !== null && aDateStart <= aDateEnd && bDateStart <= bDateEnd;
            const validTime = aStart !== null && aEnd !== null && bStart !== null && bEnd !== null && aStart < aEnd && bStart < bEnd;
            if (!validRange || !validTime) continue;
            const hasDateOverlap = aDateStart <= bDateEnd && bDateStart <= aDateEnd;
            if (hasDateOverlap && hasTimeOverlap(aStart, aEnd, bStart, bEnd)) {
              coveredIndexSet.add(j);
              messages.push(`内容 #${j + 1} 与 内容 #${i + 1} 时间重叠，优先投放内容 #${i + 1}`);
            }
            continue;
          }

          const aDays = getPeriodicDaySet(a, aType);
          const bDays = getPeriodicDaySet(b, bType);
          const [aStart, aEnd] = parseTimeRange(a.periodTimeRange);
          const [bStart, bEnd] = parseTimeRange(b.periodTimeRange);
          const validTime = aDays.length > 0 && bDays.length > 0 && aStart !== null && aEnd !== null && bStart !== null && bEnd !== null && aStart < aEnd && bStart < bEnd;
          if (!validTime) continue;
          if (hasArrayIntersection(aDays, bDays) && hasTimeOverlap(aStart, aEnd, bStart, bEnd)) {
            coveredIndexSet.add(j);
            messages.push(`内容 #${j + 1} 与 内容 #${i + 1} 时间重叠，优先投放内容 #${i + 1}`);
          }
        }
      }

      return { coveredIndexSet, messages };
    }

                `

            <div class="detail-actions">
              <button type="button" class="link-btn link-btn-danger" data-action="clear-condition-detail" data-si="${si}">清空</button>
              <button type="button" class="link-btn" data-action="edit-condition-detail" data-si="${si}">编辑</button>
            </div>
          </div>

          <div class="content-list" data-si="${si}"></div>
          <div class="inline">
            ${strategy.deliveryMode === "normal" ? "" : `<button type="button" data-action="add-content" data-si="${si}">添加投放内容</button>`}
            ${strategy.deliveryMode === "normal" ? '<span class="hint">普通投放仅支持 1 条投放内容</span>' : ""}
          </div>
        </div>
        </div>
        <div class="strategy-side-actions">
          <button class="icon-btn" type="button" title="下移" data-action="move-strategy-down" data-si="${si}" ${si === state.strategies.length - 1 ? "disabled" : ""}>↓</button>

        </div>
      `;

      const listEl = row.querySelector(".content-list");
      const periodicValidation = strategy.deliveryMode === "timeRange"
        ? resolvePeriodicPriority(strategy.contents)

          node.classList.add("covered");

        const opUp = node.querySelector('[data-op="up"]');
        const opDown = node.querySelector('[data-op="down"]');

        if (periodValueSelect) {
          const options = getPeriodValueOptions(content.periodRuleType);
          periodValueSelect.innerHTML = options.map((opt) => `<option value="${opt.value}">${opt.label}</option>`).join("");
          periodValueSelect.value = String(content.periodValue || options[0]?.value || "");
        }
        const rangeStartSelect = node.querySelector("[data-period-range-start]");
        const rangeEndSelect = node.querySelector("[data-period-range-end]");
        const rangeOptions = getPeriodRangeOptions(content.periodRuleType);
        if (rangeStartSelect) {
          rangeStartSelect.innerHTML = rangeOptions.map((opt) => `<option value="${opt.value}">${opt.label}</option>`).join("");
          rangeStartSelect.value = String(content.periodRangeStart || rangeOptions[0]?.value || "");
        }
        if (rangeEndSelect) {
          rangeEndSelect.innerHTML = rangeOptions.map((opt) => `<option value="${opt.value}">${opt.label}</option>`).join("");
          rangeEndSelect.value = String(content.periodRangeEnd || rangeOptions[0]?.value || "");
        }
        const isPresetRangeRule = content.periodRuleType === "weekly_range" || content.periodRuleType === "monthly_range";
        node.querySelectorAll(".period-range-value").forEach((el) => {
          el.style.display = isPresetRangeRule ? "" : "none";
        });
        node.querySelectorAll(".period-day-value").forEach((el) => {
          el.style.display = content.periodRuleType.endsWith("_day") ? "" : "none";
        });
        node.querySelectorAll(".period-normal-time").forEach((el) => {
          el.style.display = content.periodRuleType === "custom_range" ? "none" : "";
        });
        node.querySelectorAll(".period-custom-range-value").forEach((el) => {
          el.style.display = content.periodRuleType === "custom_range" ? "" : "none";
        });
        const timePicker = node.querySelector("[data-time-picker]");
        if (timePicker) {
          const startSelect = timePicker.querySelector("[data-picker-time-start]");
          const endSelect = timePicker.querySelector("[data-picker-time-end]");
          const optionHtml = buildTimeOptionsHtml();
          if (startSelect) startSelect.innerHTML = optionHtml;
          if (endSelect) endSelect.innerHTML = optionHtml;
        }
        const toggleContentBtn = node.querySelector('[data-action="toggle-content-detail"]');
        if (toggleContentBtn) {
          toggleContentBtn.dataset.si = String(si);
          toggleContentBtn.dataset.ci = String(ci);
          toggleContentBtn.textContent = content.contentExpanded ? "收起详情" : "展开详情";
          toggleContentBtn.style.display = content.contentName ? "" : "none";
        }
        const contentDetailBox = node.querySelector(".content-detail-box");
        if (contentDetailBox) {
          contentDetailBox.style.display = content.contentExpanded ? "block" : "none";
          const meta = getContentMeta(content.contentName);
          const nameEl = node.querySelector("[data-content-name]");
          const updateEl = node.querySelector("[data-content-update]");
          const bannerEl = node.querySelector("[data-content-banner]");
          const eventEl = node.querySelector("[data-content-event]");
          const activityEl = node.querySelector("[data-content-activity]");
          if (nameEl) nameEl.textContent = content.contentName || "未选择投放内容";
          if (updateEl) updateEl.textContent = meta ? meta.update : "";
          if (bannerEl) bannerEl.textContent = meta ? meta.banner : "—";
          if (eventEl) eventEl.textContent = meta ? meta.clickEvent : "—";
          if (activityEl) activityEl.textContent = meta ? meta.activity : "—";
        }
        node.querySelectorAll(".periodic-rule-field").forEach((el) => {
          el.style.display = strategy.deliveryMode === "timeRange" ? "" : "none";
        });
        node.querySelectorAll(".switch-condition-field").forEach((el) => {
          el.style.display = strategy.deliveryMode === "carousel" ? "" : "none";
        });
        node.querySelectorAll(".split-config-field").forEach((el) => {
          el.style.display = strategy.deliveryMode === "split" ? "" : "none";
        });
        node.querySelectorAll(".split-tail-only").forEach((el) => {
          el.style.display = strategy.deliveryMode === "split" && strategy.splitMethod === "tail" ? "" : "none";
        });
        node.querySelectorAll(".split-flow-only").forEach((el) => {
          el.style.display = strategy.deliveryMode === "split" && strategy.splitMethod !== "tail" ? "" : "none";
        });
        listEl.appendChild(node);
      });
      if (strategy.deliveryMode === "timeRange" && periodicValidation.messages.length) {
        const warning = document.createElement("div");
        warning.className = "periodic-warning";
        warning.textContent = `投放周期存在重叠：${periodicValidation.messages.join("；")}。重叠时按内容顺序优先投放靠前内容。`;
        listEl.appendChild(warning);
      }
      return row;
    }

    function normalizeNumber(value, fallback) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function renderStrategies() {
      // 业务约束：普通投放下每个子策略仅允许一条内容
      state.strategies.forEach((strategy) => {
        if (strategy.deliveryMode === "normal" && strategy.contents.length > 1) {
          strategy.contents = [strategy.contents[0]];
        }
      });
      strategiesContainer.innerHTML = "";
      state.strategies.forEach((strategy, si) => {
        strategiesContainer.appendChild(renderStrategyCard(strategy, si));
      });
      renderPreview();
    }

    function addStrategy() {
      const index = state.nextPolicySeq++;
      state.strategies.push(defaultStrategy(index));
      renderStrategies();
    }

    function removeStrategy(si) {
      if (state.strategies.length === 1) return;
      state.strategies.splice(si, 1);
      renderStrategies();
    }

    function toggleConditionDetail(si) {
      const strategy = state.strategies[si];
      if (!strategy) return;
      strategy.conditionExpanded = !strategy.conditionExpanded;
      renderStrategies();
    }

    function toggleContentDetail(si, ci) {
      const strategy = state.strategies[si];
      if (!strategy || ci < 0 || ci >= strategy.contents.length) return;
      strategy.contents[ci].contentExpanded = !strategy.contents[ci].contentExpanded;
      renderStrategies();
    }

    function clearConditionDetail(si) {
      const strategy = state.strategies[si];
      if (!strategy) return;
      strategy.audienceGroup = "";
      strategy.conditionExpanded = false;
      renderStrategies();
    }

    function clearContentDetail(si, ci) {
      const strategy = state.strategies[si];
      if (!strategy || ci < 0 || ci >= strategy.contents.length) return;
      strategy.contents[ci].contentName = "";
      strategy.contents[ci].contentExpanded = false;
      renderStrategies();
    }

    function copyStrategy(si) {
      const source = state.strategies[si];
      if (!source) return;
      const cloned = JSON.parse(JSON.stringify(source));
      const index = state.nextPolicySeq++;
      cloned.policyId = `policy_demo_${index}`;
      cloned.pointer = 0;
      state.strategies.splice(si + 1, 0, cloned);
      renderStrategies();
    }

    function moveStrategy(si, step) {
      const target = si + step;
      if (target < 0 || target >= state.strategies.length) return;
      const temp = state.strategies[si];
      state.strategies[si] = state.strategies[target];
      state.strategies[target] = temp;
      renderStrategies();
    }

    function addContent(si) {
      const strategy = state.strategies[si];
      if (!strategy) return;
      if (strategy.deliveryMode === "normal") return;
      strategy.contents.push(defaultContent(strategy.contents.length + si + 10));
      renderStrategies();
    }

    function moveContent(si, ci, step) {
      const strategy = state.strategies[si];
      const target = ci + step;
      if (target < 0 || target >= strategy.contents.length) return;
      const temp = strategy.contents[ci];
      strategy.contents[ci] = strategy.contents[target];
      strategy.contents[target] = temp;
      renderStrategies();
    }

    function removeContent(si, ci) {
      const strategy = state.strategies[si];
      strategy.contents.splice(ci, 1);
      if (!strategy.contents.length) strategy.contents.push(defaultContent(ci + si));
      strategy.pointer = 0;
      renderStrategies();
    }

    function openDatePicker(anchorEl, content, targetField) {
      hideAllPickers();
      const wrap = anchorEl.closest(".range-picker-wrap");
      if (!wrap) return;
      const popover = wrap.querySelector("[data-date-picker]");
      if (!popover) return;
      popover.dataset.targetField = targetField;
      const [start, end] = splitRangeText(content[targetField] || "");
      const startInput = popover.querySelector("[data-picker-date-start]");
      const endInput = popover.querySelector("[data-picker-date-end]");
      if (startInput) startInput.value = start || "";
      if (endInput) endInput.value = end || "";
      popover.classList.add("show");
    }

    function applyDatePreset(popover, preset) {
      const startInput = popover.querySelector("[data-picker-date-start]");
      const endInput = popover.querySelector("[data-picker-date-end]");
      if (!startInput || !endInput) return;
      if (preset === "today") {
        const today = getDateOffset(0);
        startInput.value = today;
        endInput.value = today;
      }
      if (preset === "last7") {
        startInput.value = getDateOffset(-6);
        endInput.value = getDateOffset(0);
      }
      if (preset === "last30") {
        startInput.value = getDateOffset(-29);
        endInput.value = getDateOffset(0);
      }
      if (preset === "last90") {
        startInput.value = getDateOffset(-89);
        endInput.value = getDateOffset(0);
      }
    }

    function openTimePicker(anchorEl, content, targetField) {
      hideAllPickers();
      const item = anchorEl.closest(".content-item");
      if (!item) return;
      const popover = item.querySelector("[data-time-picker]");
      if (!popover) return;
      popover.dataset.targetField = targetField;
      const [start, end] = splitRangeText(content[targetField] || "");
      const startSelect = popover.querySelector("[data-picker-time-start]");
      const endSelect = popover.querySelector("[data-picker-time-end]");
      if (startSelect) startSelect.value = start || "09:00";
      if (endSelect) endSelect.value = end || "18:00";
      popover.classList.add("show");
    }

    function renderPreview() {
      return;
    }

    document.getElementById("addStrategyBtn").addEventListener("click", addStrategy);

    strategiesContainer.addEventListener("click", (event) => {
      const target = event.target.closest("[data-action], [data-op]");
      if (!target) return;
      const si = normalizeNumber(target.dataset.si, -1);
      const ci = normalizeNumber(target.dataset.ci, -1);
      const strategy = state.strategies[si];
      const content = strategy && ci >= 0 ? strategy.contents[ci] : null;

      if (target.dataset.action === "open-date-picker" && content) {
        openDatePicker(target, content, target.dataset.targetField);
        return;
      }
      if (target.dataset.action === "open-time-picker" && content) {
        openTimePicker(target, content, target.dataset.targetField);
        return;
      }
      if (target.dataset.action === "quick-date-range") {
        const popover = target.closest("[data-date-picker]");
        if (popover) applyDatePreset(popover, target.dataset.rangePreset);
        return;
      }
      if (target.dataset.action === "cancel-date-picker") {
        const popover = target.closest("[data-date-picker]");
        if (popover) popover.classList.remove("show");
        return;
      }
      if (target.dataset.action === "apply-date-picker" && content) {
        const popover = target.closest("[data-date-picker]");
        if (!popover) return;
        const field = popover.dataset.targetField;
        const startInput = popover.querySelector("[data-picker-date-start]");
        const endInput = popover.querySelector("[data-picker-date-end]");
        if (field && startInput && endInput && startInput.value && endInput.value) {
          content[field] = `${startInput.value}～${endInput.value}`;
          popover.classList.remove("show");
          renderStrategies();
        }
        return;
      }
      if (target.dataset.action === "cancel-time-picker") {
        const popover = target.closest("[data-time-picker]");
        if (popover) popover.classList.remove("show");
        return;
      }
      if (target.dataset.action === "apply-time-picker" && content) {
        const popover = target.closest("[data-time-picker]");
        if (!popover) return;
        const field = popover.dataset.targetField;
        const startSelect = popover.querySelector("[data-picker-time-start]");
        const endSelect = popover.querySelector("[data-picker-time-end]");
        if (field && startSelect && endSelect) {
          content[field] = `${startSelect.value}～${endSelect.value}`;
          popover.classList.remove("show");
          renderStrategies();
        }
        return;
      }

      if (target.dataset.action === "add-content") addContent(si);
      if (target.dataset.action === "remove-strategy") removeStrategy(si);
      if (target.dataset.action === "copy-strategy") copyStrategy(si);
      if (target.dataset.action === "move-strategy-up") moveStrategy(si, -1);
      if (target.dataset.action === "move-strategy-down") moveStrategy(si, 1);
      if (target.dataset.action === "toggle-condition-detail") toggleConditionDetail(si);
      if (target.dataset.action === "toggle-content-detail") toggleContentDetail(si, ci);
      if (target.dataset.action === "clear-condition-detail") clearConditionDetail(si);
      if (target.dataset.action === "clear-content-detail") clearContentDetail(si, ci);
      if (target.dataset.op === "up") moveContent(si, ci, -1);
      if (target.dataset.op === "down") moveContent(si, ci, 1);
      if (target.dataset.op === "delete") removeContent(si, ci);
    });

    strategiesContainer.addEventListener("change", (event) => {
      const target = event.target;
      const si = normalizeNumber(target.dataset.si, -1);
      if (si < 0 || si >= state.strategies.length) return;
      const strategy = state.strategies[si];

      if (target.dataset.cfield) {
        const ci = normalizeNumber(target.dataset.ci, -1);
        if (ci < 0 || ci >= strategy.contents.length) return;
        const content = strategy.contents[ci];
        const key = target.dataset.cfield;
        const value = target.type === "number" ? normalizeNumber(target.value, 0) : target.value;
        content[key] = key === "waitValue" ? Math.max(0, value) : value;
        if (key === "contentName") {
          renderStrategies();
          return;
        }
        if (key === "periodRuleType") {
          normalizePeriodValue(content);
          normalizePeriodRange(content);
          renderStrategies();
          return;
        }
        if (key === "periodValue" || key === "periodRangeStart" || key === "periodRangeEnd") {
          renderStrategies();
          return;
        }
      } else if (target.dataset.field) {
        const key = target.dataset.field;
        strategy[key] = target.type === "number" ? normalizeNumber(target.value, 0) : target.value;
        if (key === "audienceGroup") {
          renderStrategies();
          return;
        }
        if (key === "deliveryMode" || key === "splitMethod") {
          renderStrategies();
          return;
        }
      }
      renderPreview();
    });

    document.addEventListener("click", (event) => {
      const insidePicker = event.target.closest(".picker-popover");
      const pickerTrigger = event.target.closest("[data-action='open-date-picker'], [data-action='open-time-picker']");
      if (!insidePicker && !pickerTrigger) {
        hideAllPickers();
      }
    });

    ["taskName", "startTime", "endTime"].forEach((id) => {
      document.getElementById(id).addEventListener("change", renderPreview);
    });

    state.strategies.push(defaultStrategy(1));
    renderStrategies();
  </script>
</body>
</html>
