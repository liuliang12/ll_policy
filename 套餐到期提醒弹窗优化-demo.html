<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套餐/权益包到期提醒弹窗优化 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --c-bg: #F7F8FA;
    --c-surface: #FFFFFF;
    --c-border: #E8E9ED;
    --c-border-light: #F0F1F3;
    --c-text-1: #1D2129;
    --c-text-2: #4E5969;
    --c-text-3: #86909C;
    --c-text-4: #C9CDD4;

    --c-brand: #3370FF;
    --c-brand-light: #EDF2FF;
    --c-brand-border: #BEDAFF;

    --c-warn: #E8684A;
    --c-warn-light: #FFF3F0;
    --c-warn-border: #FDCDC5;

    --c-orange: #D97706;
    --c-orange-light: #FFFBEB;
    --c-orange-border: #FDE68A;

    --c-green: #0F9D58;
    --c-green-light: #F0FDF4;

    --c-ai: #6D28D9;
    --c-ai-light: #F5F3FF;
    --c-ai-border: #DDD6FE;

    --c-sec: #1E40AF;
    --c-sec-light: #EFF6FF;
    --c-sec-border: #BFDBFE;

    --c-mem: #B45309;
    --c-mem-light: #FFFBEB;
    --c-mem-border: #FDE68A;

    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 14px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.08);
    --shadow-modal: 0 4px 12px rgba(0,0,0,.06), 0 20px 48px rgba(0,0,0,.12);
    --transition: 180ms cubic-bezier(.4,0,.2,1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

    --modal-px: 24px;
    --modal-section-gap: 12px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--c-bg); color: var(--c-text-1); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ── Control Panel ── */
  .panel { position: sticky; top: 0; z-index: 100; background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 20px 32px; }
  .panel-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; color: var(--c-text-1); margin-bottom: 14px; }
  .panel-rows { display: flex; flex-direction: column; gap: 10px; }
  .panel-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .ctrl { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 12px; font-weight: 500; color: var(--c-text-3); min-width: 56px; letter-spacing: .02em; }
  .seg { display: inline-flex; border: 1px solid var(--c-border); border-radius: var(--radius-s); overflow: hidden; }
  .seg button { padding: 5px 14px; font-size: 12px; font-weight: 500; font-family: var(--font); border: none; background: transparent; color: var(--c-text-3); cursor: pointer; transition: var(--transition); border-right: 1px solid var(--c-border); letter-spacing: .01em; }
  .seg button:last-child { border-right: none; }
  .seg button:hover:not(.on) { background: var(--c-bg); color: var(--c-text-2); }
  .seg button.on { background: var(--c-text-1); color: #fff; }

  /* ── Stage ── */
  .stage { display: flex; flex-direction: column; align-items: center; padding: 40px 24px 80px; min-height: calc(100vh - 120px); }

  /* ── Flow Steps ── */
  .flow { display: none; align-items: center; gap: 6px; margin-bottom: 24px; font-size: 12px; color: var(--c-text-3); }
  .flow.show { display: flex; }
  .flow-step { padding: 4px 12px; border-radius: 20px; font-weight: 500; cursor: pointer; transition: var(--transition); background: var(--c-bg); border: 1px solid var(--c-border); }
  .flow-step.current { background: var(--c-text-1); color: #fff; border-color: var(--c-text-1); }
  .flow-step.done { background: var(--c-green-light); color: var(--c-green); border-color: #BBF7D0; }
  .flow-arr { color: var(--c-text-4); font-size: 14px; }

  /* ── Banner ── */
  .banner-wrap { display: none; width: 100%; max-width: 520px; }
  .banner { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: var(--radius-m); background: var(--c-surface); border: 1px solid var(--c-border); box-shadow: var(--shadow-card); }
  .banner-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .t-default .banner-dot { background: var(--c-brand); }
  .t-ai .banner-dot { background: var(--c-ai); }
  .t-sec .banner-dot { background: var(--c-sec); }
  .t-mem .banner-dot { background: var(--c-mem); }
  .banner-body { flex: 1; font-size: 13px; color: var(--c-text-2); }
  .banner-body strong { font-weight: 600; color: var(--c-text-1); }
  .banner-body .hl { font-weight: 600; }
  .t-default .banner-body .hl { color: var(--c-brand); }
  .t-ai .banner-body .hl { color: var(--c-ai); }
  .t-sec .banner-body .hl { color: var(--c-sec); }
  .t-mem .banner-body .hl { color: var(--c-orange); }
  .banner-cta { padding: 6px 14px; border-radius: var(--radius-s); font-size: 12px; font-weight: 600; font-family: var(--font); border: none; color: #fff; cursor: pointer; white-space: nowrap; transition: var(--transition); }
  .banner-cta:active { transform: scale(.97); }
  .t-default .banner-cta { background: var(--c-brand); }
  .t-ai .banner-cta { background: var(--c-ai); }
  .t-sec .banner-cta { background: var(--c-sec); }
  .t-mem .banner-cta { background: var(--c-mem); }
  .banner-x { width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; color: var(--c-text-4); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .banner-x:hover { background: var(--c-bg); color: var(--c-text-3); }

  /* ── Modal Shell ── */
  .m-wrap { display: none; width: 100%; max-width: 480px; }
  .m-wrap.show { display: block; }
  .modal { background: var(--c-surface); border-radius: var(--radius-l); box-shadow: var(--shadow-modal); overflow: hidden; position: relative; }

  /* ── Shared modal elements ── */
  .m-bar { height: 3px; }
  .t-default .m-bar { background: var(--c-brand); }
  .t-ai .m-bar { background: linear-gradient(90deg, #7C3AED, #A78BFA); }
  .t-sec .m-bar { background: linear-gradient(90deg, var(--c-sec), #3B82F6); }
  .t-mem .m-bar { background: linear-gradient(90deg, var(--c-mem), #F59E0B); }

  .m-close {
    position: absolute; top: 12px; right: 14px; z-index: 2;
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: var(--c-bg); color: var(--c-text-3);
    cursor: pointer; font-size: 14px; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .m-close:hover { background: var(--c-border); color: var(--c-text-2); }
  .m-close:active { transform: scale(.94); }

  /* ─────────────────────────────────────────────────────────
     ADMIN SOON LAYOUT
  ───────────────────────────────────────────────────────── */

  /* Modal name */
  .as-name {
    display: flex; align-items: center; gap: 6px;
    padding: 16px 48px 0 20px; margin-bottom: 12px;
    font-size: 13px; font-weight: 600; color: var(--c-brand);
  }
  .as-name svg { flex-shrink: 0; }

  /* Title */
  .as-title {
    font-size: 18px; font-weight: 800; letter-spacing: -.02em;
    line-height: 1.35; color: var(--c-text-1);
    padding: 18px 48px 0 var(--modal-px); margin-bottom: 8px;
  }

  /* Subtitle */
  .as-subtitle {
    padding: 0 var(--modal-px); margin-bottom: 14px;
    font-size: 13px; color: var(--c-text-3); line-height: 1.5;
  }
  .cf-buffer-hl { font-weight: 700; color: var(--c-warn); }
  .as-title .hl { font-weight: 800; }
  .t-default .as-title .hl { color: var(--c-warn); }
  .t-ai .as-title .hl { color: var(--c-ai); }
  .t-sec .as-title .hl { color: var(--c-sec); }
  .t-mem .as-title .hl { color: var(--c-orange); }

  /* Context line */
  .as-context {
    margin: 0 20px 16px; padding: 0;
    font-size: 12px; color: var(--c-text-4); line-height: 1.5;
  }
  .as-context strong { font-weight: 500; color: var(--c-text-3); }

  /* Section header */
  .as-section-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; margin-bottom: 10px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
  }
  .as-section-left {
    display: flex; align-items: center; gap: 6px;
  }
  .as-section-left svg { flex-shrink: 0; }
  .as-section-right {
    font-size: 12px; font-weight: 400; color: var(--c-text-3);
  }

  /* Impact cards */
  .as-impacts { padding: 0 20px; margin-bottom: 6px; }
  .as-impact {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 14px; margin-bottom: 6px;
    border-radius: var(--radius-s);
    border-left: 3px solid;
    background: var(--c-bg);
  }
  .as-impact:last-child { margin-bottom: 0; }
  .t-default .as-impact { border-left-color: var(--c-brand); }
  .t-ai .as-impact { border-left-color: var(--c-ai); }
  .t-sec .as-impact { border-left-color: var(--c-sec); }
  .t-mem .as-impact { border-left-color: var(--c-orange); }
  .as-impact-left { flex: 1; min-width: 0; }
  .as-impact-hd {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
    margin-bottom: 2px;
  }
  .as-impact-hd svg { color: var(--c-text-3); flex-shrink: 0; }
  .as-impact-desc { font-size: 12px; color: var(--c-text-2); line-height: 1.4; }
  .as-impact-data {
    flex-shrink: 0; font-size: 12px; font-weight: 600;
    text-align: right; white-space: nowrap;
  }
  .t-default .as-impact-data { color: var(--c-brand); }
  .t-ai .as-impact-data { color: var(--c-ai); }
  .t-sec .as-impact-data { color: var(--c-sec); }
  .t-mem .as-impact-data { color: var(--c-orange); }

  /* Expired alert banner */
  .as-alert {
    display: flex; align-items: center; gap: 8px;
    margin: 0 20px 14px; padding: 8px 12px;
    border-radius: var(--radius-s);
    background: var(--c-warn-light); border: 1px solid var(--c-warn-border);
    font-size: 12px; font-weight: 500; color: var(--c-warn);
  }
  .as-alert svg { flex-shrink: 0; }

  /* Impact list box（临期 / 过期共用） */
  .impact-box {
    margin: 0 var(--modal-px) var(--modal-section-gap);
    padding: 2px 14px;
    border-radius: var(--radius-m);
    background: #fff;
    border: 1px solid var(--c-border);
  }
  .impact-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 2px;
  }
  .impact-item + .impact-item { border-top: 1px solid var(--c-border-light); }
  .impact-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .impact-icon-red { background: #FFF0ED; color: #E8684A; }
  .impact-icon-amber { background: #FFFBEB; color: #D97706; }
  .impact-icon-blue { background: #EDF2FF; color: #3370FF; }
  .impact-icon-green { background: #ECFDF5; color: #059669; }
  .impact-icon-purple { background: #F3E8FF; color: #7C3AED; }
  .impact-body { flex: 1; min-width: 0; padding-top: 1px; }
  .impact-title { font-size: 14px; font-weight: 600; color: var(--c-text-1); margin-bottom: 4px; line-height: 1.3; }
  .impact-desc { font-size: 12px; color: var(--c-text-3); line-height: 1.55; }
  .impact-hl { color: var(--c-warn); font-weight: 600; }
  .impact-tag {
    flex-shrink: 0;
    align-self: center;
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 400;
    padding: 5px 10px;
    border-radius: 4px;
    background: #F2F3F5;
    border: none;
    color: #86909C;
    white-space: nowrap;
    line-height: 1.2;
  }
  .impact-tag-label { color: #86909C; }
  .impact-tag-val { color: #86909C; font-weight: 400; margin-left: 4px; }
  .impact-tag-warn {
    background: #F2F3F5;
    border: none;
    color: #86909C;
    font-size: 11px;
    font-weight: 400;
    padding: 5px 10px;
  }

  /* Expired impact style override */
  .modal.expired .as-impact { border-left-color: var(--c-warn); }
  .modal.expired .as-impact-data { color: var(--c-green); }
  .modal.expired .as-name { color: var(--c-warn); }
  .modal.expired .as-title .hl { color: var(--c-warn) !important; }

  /* More link */
  .as-more {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 4px var(--modal-px) 10px;
    font-size: 12px; font-weight: 500; color: var(--c-text-3);
    cursor: pointer; transition: color var(--transition);
  }
  .as-more:hover { color: var(--c-brand); }
  .as-more svg { flex-shrink: 0; }

  /* ─── Compare Page ─── */
  .cmp-wrap { display: none; width: 100%; max-width: 820px; }
  .cmp-wrap.show { display: block; }
  .cmp-page {
    background: var(--c-surface); border-radius: var(--radius-l);
    box-shadow: var(--shadow-modal); overflow: hidden;
  }
  .cmp-hdr {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 20px; border-bottom: 1px solid var(--c-border);
  }
  .cmp-back {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--c-bg); color: var(--c-text-3); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition); flex-shrink: 0;
  }
  .cmp-back:hover { background: var(--c-border); color: var(--c-text-2); }
  .cmp-hdr-title { font-size: 14px; font-weight: 700; color: var(--c-text-1); }

  .cmp-cols {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: 1px solid var(--c-border);
  }
  .cmp-top-tags {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: none; margin-bottom: 0;
  }
  .cmp-top-tags .cmp-tag-cell {
    text-align: center; padding: 0 8px 4px;
  }
  .cmp-top-tags .cmp-tag-cell:first-child { padding: 0; }
  .cmp-col-tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 4px; letter-spacing: .02em;
  }
  .cmp-tag-brand { background: var(--c-brand); color: #fff; }
  .cmp-tag-warn { background: var(--c-warn); color: #fff; }

  .cmp-col-label {
    padding: 6px 12px 14px; text-align: center;
    font-size: 11px; color: var(--c-text-3);
  }
  .cmp-col-label:first-child { text-align: left; padding-left: 20px; }
  .cmp-col-name { font-size: 14px; font-weight: 700; color: var(--c-text-1); display: block; margin-top: 2px; }
  .cmp-col-desc { font-size: 10px; color: var(--c-text-3); display: block; margin-top: 2px; }
  .cmp-col-price { font-size: 11px; color: var(--c-text-2); margin-top: 4px; }
  .cmp-col-price .price-num { font-size: 18px; font-weight: 800; color: var(--c-text-1); }
  .cmp-col-fn { font-size: 13px; font-weight: 700; color: var(--c-text-1); display: flex; align-items: flex-end; padding-bottom: 16px !important; }
  .cmp-col-current { background: rgba(51,112,255,.04); }

  .cmp-buy {
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 8px; padding: 5px 16px; border-radius: var(--radius-s);
    border: 1.5px solid var(--c-text-1); background: transparent;
    font-size: 11px; font-weight: 600; font-family: var(--font);
    color: var(--c-text-1); cursor: pointer; transition: var(--transition);
  }
  .cmp-buy:hover { background: var(--c-text-1); color: #fff; }
  .cmp-buy-primary {
    background: var(--c-brand); color: #fff; border-color: var(--c-brand);
  }
  .cmp-buy-primary:hover { background: var(--c-brand); filter: brightness(.9); color: #fff; }

  .cmp-body { max-height: 400px; overflow-y: auto; }

  .cmp-cat {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    background: var(--c-bg); border-bottom: 1px solid var(--c-border);
    font-size: 12px; font-weight: 700; color: var(--c-text-1);
  }
  .cmp-cat-cell { padding: 10px 12px; display: flex; align-items: center; justify-content: center; }
  .cmp-cat-cell:first-child { padding-left: 20px; justify-content: flex-start; }
  .cmp-cat-count { font-weight: 500; color: var(--c-text-3); }

  .cmp-row {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: 1px solid var(--c-border-light);
    font-size: 12px; color: var(--c-text-2);
    transition: background var(--transition);
  }
  .cmp-row:hover { background: #FAFBFC; }
  .cmp-cell { padding: 10px 12px; display: flex; align-items: center; }
  .cmp-cell:first-child { padding-left: 20px; color: var(--c-text-1); font-weight: 500; }
  .cmp-cell:not(:first-child) { justify-content: center; }
  .cmp-cell:nth-child(3) { background: rgba(51,112,255,.03); }
  .cmp-cat-cell:nth-child(3) { background: rgba(51,112,255,.05); }
  .cmp-top-tags .cmp-tag-cell:nth-child(3) { background: var(--c-brand-light); border-radius: var(--radius-m) var(--radius-m) 0 0; }

  .cmp-x { color: var(--c-text-4); }
  .cmp-check { color: var(--c-brand); }
  .cmp-val-hl { color: var(--c-brand); font-weight: 600; }

  .cmp-expand {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 20px; font-size: 12px; font-weight: 600;
    color: var(--c-text-2); cursor: pointer; border: none;
    background: none; font-family: var(--font);
    transition: color var(--transition);
  }
  .cmp-expand:hover { color: var(--c-brand); }
  .cmp-expand svg { flex-shrink: 0; }

  /* CTA */
  .as-cta { padding: 0 var(--modal-px) 12px; }
  .renew-btn-wrap {
    position: relative;
    padding-top: 12px;
  }
  .renew-badge {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }
  /* 左上：火焰渐变条 */
  .renew-badge-countdown {
    left: 8px;
    top: 0;
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 20px 0 10px;
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    color: #fff;
    white-space: nowrap;
    background: linear-gradient(105deg, #E04E1B 0%, #F97316 48%, #FB923C 100%);
    border-radius: 6px 0 0 6px;
    box-shadow: 0 2px 8px rgba(232, 78, 27, .32);
    clip-path: polygon(
      0 0,
      0 100%,
      calc(100% - 16px) 100%,
      calc(100% - 7px) 74%,
      100% 50%,
      calc(100% - 7px) 26%,
      calc(100% - 16px) 0
    );
  }
  /* 右上：花边圆标 */
  .renew-badge-save {
    right: 2px;
    top: -6px;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .renew-badge-save-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .renew-badge-save-text {
    position: relative;
    z-index: 1;
    transform: rotate(45deg);
    font-size: 9px;
    font-weight: 700;
    line-height: 1.15;
    color: #E04E1B;
    text-align: center;
    white-space: nowrap;
    letter-spacing: -.02em;
  }
  .renew-btn {
    width: 100%;
    padding: 16px 16px 9px;
    border-radius: 12px;
    border: none;
    background: #5266F1;
    color: #fff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-family: var(--font);
    transition: all .2s ease;
    box-shadow: 0 4px 14px rgba(82, 102, 241, .28);
  }
  .renew-btn:hover {
    filter: brightness(1.04);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(82, 102, 241, .38);
  }
  .renew-btn:active {
    transform: scale(.98) translateY(0);
    box-shadow: 0 4px 12px rgba(82, 102, 241, .28);
  }
  .renew-btn-line1 {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .01em;
    line-height: 1.2;
  }
  .renew-btn-divider {
    width: 1px;
    height: 13px;
    background: rgba(255, 255, 255, .45);
    flex-shrink: 0;
  }
  .renew-price-num { font-size: 15px; font-weight: 700; }
  .renew-price-unit { font-size: 11px; font-weight: 500; opacity: .92; }

function buildImpactRow(i, { tag } = {}) {
  const iconMap = {
    'folder-blue': ['impact-icon-blue', IMPACT_ICO.folder],
    'upload-green': ['impact-icon-green', IMPACT_ICO.upload],
    'shield-purple': ['impact-icon-purple', IMPACT_ICO.shield],
    'ai-purple': ['impact-icon-purple', IMPACT_ICO.ai],
    'upload-red': ['impact-icon-red', IMPACT_ICO.upload],
    'upload-amber': ['impact-icon-amber', IMPACT_ICO.upload],
    'shield-amber': ['impact-icon-amber', IMPACT_ICO.shield],
    'ai-amber': ['impact-icon-amber', IMPACT_ICO.ai],
  };
  const [iconCls, svg] = iconMap[i.icon] || iconMap['upload-amber'];
  const t = tag ?? i.tag;
  let tagHtml = '';
  if (t) {
    tagHtml = typeof t === 'string'
      ? `<span class="impact-tag impact-tag-warn">${t}</span>`
      : `<span class="impact-tag"><span class="impact-tag-label">${t.label}</span><span class="impact-tag-val">${t.val}</span></span>`;
  }
  return `
    <div class="impact-item">
      <div class="impact-icon ${iconCls}">${svg}</div>
      <div class="impact-body">
        <div class="impact-title">${i.t}</div>
        <div class="impact-desc">${i.d}</div>
      </div>
      ${tagHtml}
    </div>`;
}

const RENEW = {
  priceNum: '¥139',
  priceUnit: '/人/年',
  originNum: '¥199',
  originUnit: '/人/年',
  save: '30%',
  promoDays: 3,

function formatRenewPrice(num, unit, numCls = 'renew-price-num', unitCls = 'renew-price-unit') {
  return `<span class="${numCls}">${num}</span><span class="${unitCls}">${unit}</span>`;

function buildRenewBtnHTML({ id = 'btnMain', action = '立即续期' } = {}) {
  const days = isSoon() ? (parseInt(S.days, 10) || RENEW.promoDays) : RENEW.promoDays;
  const scallopPath = (() => {
    const cx = 32, cy = 32, R = 24, bump = 3.2, n = 18;
    let d = '';
    for (let i = 0; i < n; i++) {
      const a0 = (i / n) * Math.PI * 2 - Math.PI / 2;
      const a1 = ((i + 0.5) / n) * Math.PI * 2 - Math.PI / 2;
      const a2 = ((i + 1) / n) * Math.PI * 2 - Math.PI / 2;
      const x0 = cx + R * Math.cos(a0), y0 = cy + R * Math.sin(a0);
      const x1 = cx + (R + bump) * Math.cos(a1), y1 = cy + (R + bump) * Math.sin(a1);
      const x2 = cx + R * Math.cos(a2), y2 = cy + R * Math.sin(a2);
      d += (i === 0 ? `M ${x0.toFixed(1)} ${y0.toFixed(1)} ` : '') + `Q ${x1.toFixed(1)} ${y1.toFixed(1)} ${x2.toFixed(1)} ${y2.toFixed(1)} `;
    }
    return d + 'Z';
  })();
  return `
    <div class="renew-btn-wrap">
      <span class="renew-badge renew-badge-countdown">优惠剩余${days}天</span>
      <span class="renew-badge renew-badge-save">
        <svg class="renew-badge-save-svg" viewBox="0 0 64 64" aria-hidden="true">
          <path d="${scallopPath}" fill="rgba(255,244,235,0.95)" stroke="#FFB488" stroke-width="1.4"/>
        </svg>
        <span class="renew-badge-save-text">已省${RENEW.save}</span>
      </span>
      <button class="renew-btn" id="${id}">
        <span class="renew-btn-line1">
          <span>${action}</span>
          <span class="renew-btn-divider"></span>
          <span>${formatRenewPrice(RENEW.priceNum, RENEW.priceUnit)}</span>
        </span>
        <span class="renew-btn-origin">原价${formatRenewPrice(RENEW.originNum, RENEW.originUnit)}</span>
      </button>
    </div>`;
}

            <svg width="48" height="48" viewBox="0 0 64 64" fill="none"><rect x="8" y="8" width="20" height="20" rx="2" stroke="var(--c-text-4)" stroke-width="2"/><rect x="36" y="8" width="20" height="20" rx="2" stroke="var(--c-text-4)" stroke-width="2"/><rect x="8" y="36" width="20" height="20" rx="2" stroke="var(--c-text-4)" stroke-width="2"/><rect x="12" y="12" width="12" height="12" rx="1" fill="var(--c-text-4)"/><rect x="40" y="12" width="12" height="12" rx="1" fill="var(--c-text-4)"/><rect x="12" y="40" width="12" height="12" rx="1" fill="var(--c-text-4)"/><rect x="38" y="38" width="6" height="6" fill="var(--c-text-4)"/><rect x="50" y="38" width="6" height="6" fill="var(--c-text-4)"/><rect x="38" y="50" width="6" height="6" fill="var(--c-text-4)"/><rect x="50" y="50" width="6" height="6" fill="var(--c-text-4)"/><rect x="44" y="44" width="6" height="6" fill="var(--c-text-4)"/></svg>
          </div>
          <div class="as-qr-text">微信扫码联系专属销售</div>
        </div>
      </div>
      <span class="sep"></span>
      <a class="as-popover-trigger" id="notRenewLink">暂不续费</a>
    </div>`;
}

/* ── Build: standard layout ── */
function buildStandardHTML() {
  return `
    <button class="m-close">&times;</button>
    <div class="m-body">
      <div class="m-head">
        <div class="m-title" id="mTitle"></div>
      </div>
      <div class="as-subtitle" id="mSubtitle"></div>
      <div class="m-impacts">
        <div id="mImpacts"></div>
      </div>
    </div>
    <div class="m-cta">
      <button class="btn-main" id="btnMain"></button>
      <div class="notify-ok" id="notifyOk">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.5 12L13 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        已通知管理员，将收到续费提醒
      </div>
      <div class="cta-links" id="ctaLinks"></div>
    </div>`;
}

/* ── Populate standard layout fields ── */
function populateStandard() {
  const { type, days, theme, role } = S;
  const exp = isExp();
  const thCls = tc(theme);

  $('modal').className = `modal ${thCls}`;

  const titleEl = $('mTitle');
  const titleFn = D.titles[type]?.[theme];
  titleEl.innerHTML = titleFn ? `您订阅的${titleFn(days)}` : '';
  titleEl.className = exp ? 'm-title expired' : 'm-title';

  const subtitleEl = $('mSubtitle');
  if (subtitleEl) {
    const subtitleMap = {
      default: '5名成员使用中，到期后可能造成以下影响：',
      ai: '团队近30天已使用AI功能438次，到期后影响：',
      sec: '当前5个团队、86位成员受安全策略保护，到期后影响：',
      mem: '企业空间已用320GB/500GB，到期后影响：',
    };
    subtitleEl.textContent = subtitleMap[theme] || subtitleMap.default;
  }

  const ik = isSoon() ? 'soon' : 'exp';
  $('mImpacts').innerHTML = D.impacts[theme][ik].map(i =>
    `<div class="as-impact">
      <div class="as-impact-left">
        <div class="as-impact-desc">${i.t}</div>
      </div>
      <div class="as-impact-data">${i.d}</div>
    </div>`
  ).join('');

  const ctaKey = isSoon() ? 'soon' : 'exp';
  const ctaTxt = D.cta[role][ctaKey][theme];
  const btn = $('btnMain');
  btn.className = role === 'member' ? 'btn-main outline' : 'btn-main';
  btn.innerHTML = `<span>${ctaTxt}</span>`;

  $('notifyOk').style.display = 'none';

  const links = $('ctaLinks');
  if (role === 'admin') {
    links.innerHTML = `<a>联系销售</a><span class="sep"></span><div class="remind"><a id="remindLink">稍后提醒</a><div class="remind-menu"><a>1 天后提醒</a><a>3 天后提醒</a><a>7 天后提醒</a></div></div>`;
  } else {
    links.innerHTML = `<a>了解到期影响</a><span class="sep"></span><div class="remind"><a>稍后提醒</a><div class="remind-menu"><a>1 天后提醒</a><a>3 天后提醒</a><a>7 天后提醒</a></div></div>`;
  }
}

function goStep(n) {
  step = n;
  const mw = $('mWrap'), cw = $('cfWrap'), f1 = $('fs1'), f2 = $('fs2');
  if (n === 1) {
    mw.classList.add('show'); cw.classList.remove('show');
    f1.className = 'flow-step current'; f2.className = 'flow-step';
  } else {
    mw.classList.remove('show'); cw.classList.add('show');
    f1.className = 'flow-step done'; f2.className = 'flow-step current';
    renderCf();
  }
  const ck = $('abCheck'); if (ck) { ck.checked = false; togAbandon(); }
}

function renderCf() {
  const rs = D.risks[S.theme];
  const rows = rs.map(r => `
    <div class="cf-risk-row">
      <div class="cf-risk-cell cf-risk-cell-name">${r.name}</div>
      <div class="cf-risk-cell cf-risk-cell-status"><span class="cf-status-dot"></span>${r.status}</div>
      <div class="cf-risk-cell cf-risk-cell-impact">${r.impact}</div>
    </div>`).join('');
  $('riskList').innerHTML = `
    <div class="cf-risk-table">
      <div class="cf-risk-hd">
        <div class="cf-risk-hd-cell">权益项</div>
        <div class="cf-risk-hd-cell">回收前</div>
        <div class="cf-risk-hd-cell">回收后影响</div>
      </div>
      ${rows}
    </div>`;
  $('cfTitle').textContent = D.cfTitle[S.type] || '确认暂不续费？';
  $('cfCta').innerHTML = buildRenewBtnHTML({ id: 'cfBtn', action: '不放弃，我要续费' });
}

function render() {
  step = 1;
  const { type, days, theme, role } = S;
  const isBanner = isSoon() && days === '60';
  const exp = isExp();
  const thCls = tc(theme);

  $('flow').className = (isAdminExp()) ? 'flow show' : 'flow';
  $('fs1').className = 'flow-step current'; $('fs2').className = 'flow-step';
  $('cfWrap').classList.remove('show');
  $('cmpWrap').classList.remove('show');

  $('bannerWrap').style.display = isBanner ? 'block' : 'none';
  const mw = $('mWrap');
  if (isBanner) { mw.classList.remove('show'); return; }
  mw.classList.add('show');

  // banner content (always update)
  const bnr = $('banner');
  bnr.className = `banner ${thCls}`;
  $('bannerBody').innerHTML = D.banner[theme](days);
  $('bannerCta').textContent = role === 'admin' ? '查看续费方案' : '通知管理员';

  // modal content
  const modal = $('modal');
  if (isAdminSoon()) {
    modal.className = `modal ${thCls}`;
    modal.innerHTML = buildAdminSoonHTML();
  } else if (isAdminExp()) {
    modal.className = `modal ${thCls} expired`;
    modal.innerHTML = buildAdminExpHTML();
  } else {
    modal.innerHTML = buildStandardHTML();
    populateStandard();
  }

  // days control opacity
  const dg = document.querySelector('[data-k="days"]');
  dg.style.opacity = isSoon() ? '1' : '.35';
  dg.style.pointerEvents = isSoon() ? 'auto' : 'none';
}

function togAbandon() {
  const b = $('abBtn');
  if ($('abCheck').checked) {
    b.disabled = false; b.classList.add('ok');
  } else {
    b.disabled = true; b.classList.remove('ok');
  }
}

function $(id) { return document.getElementById(id); }

/* ── Event delegation ── */
document.addEventListener('click', e => {
  // Primary button
  const btnMain = e.target.closest('#btnMain');
  if (btnMain) {
    if (S.role === 'member') {
      const notifyOk = $('notifyOk');
      if (notifyOk) notifyOk.style.display = 'flex';
      const span = btnMain.querySelector('span');
      if (span) span.textContent = '已通知';
    }
  }
  // Remind / snooze → step 2 (expired only)
  const remindLink = e.target.closest('#remindLink');
  if (remindLink && isExp() && S.role === 'admin') {
    e.preventDefault();
    goStep(2);
  }
  const notRenewLink = e.target.closest('#notRenewLink');
  if (notRenewLink) {
    e.preventDefault();
    goStep(2);
  }
});

/* ── Seg controls ── */
document.querySelectorAll('.seg').forEach(g => {
  const k = g.dataset.k;
  g.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      g.querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      S[k] = b.dataset.v;
      render();
    });
  });
});

function cellHtml(v) {
  if (v === '×') return `<span class="cmp-x">${svgX}</span>`;
  if (v === '✓') return `<span class="cmp-check">${svgCk}</span>`;
  return `<span class="cmp-val-hl">${v}</span>`;
}

function renderCmpPage() {
  $('cmpBody').innerHTML = CMP_TABLE.map(cat => {
    const [cPaid,cFree,cAdv,cFlag] = cat.counts;

      <div class="cmp-cat-cell">${cat.cat}</div>
      <div class="cmp-cat-cell"><span class="cmp-cat-count">权益项: ${cFree}</span></div>

      <div class="cmp-cell">${r.name}</div>
      <div class="cmp-cell">${cellHtml(r.free)}</div>

      <div class="cmp-cell">${cellHtml(r.adv)}</div>

}

function showCmpPage() {
  $('mWrap').classList.remove('show');

  if (isExp()) {
    $('cmpTag1').textContent = '当前套餐';
    $('cmpTag1').className = 'cmp-col-tag cmp-tag-brand';
    $('cmpTag2').textContent = '已过期套餐';
    $('cmpTag2').className = 'cmp-col-tag cmp-tag-warn';
  } else {
    $('cmpTag1').textContent = '过期后';
    $('cmpTag1').className = 'cmp-col-tag cmp-tag-warn';
    $('cmpTag2').textContent = '当前套餐';
    $('cmpTag2').className = 'cmp-col-tag cmp-tag-brand';

  renderCmpPage();
}

function hideCmpPage() {
  $('cmpWrap').classList.remove('show');
  $('mWrap').classList.add('show');
}

$('cmpBack').addEventListener('click', hideCmpPage);

document.addEventListener('click', e => {
  if (e.target.closest('.as-more')) {
    showCmpPage();
  }
});

render();
