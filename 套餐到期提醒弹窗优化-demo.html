<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套餐/权益包到期提醒弹窗优化 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --c-bg: #F7F8FA;
    --c-surface: #FFFFFF;
    --c-border: #E8E9ED;
    --c-border-light: #F0F1F3;
    --c-text-1: #1D2129;
    --c-text-2: #4E5969;
    --c-text-3: #86909C;
    --c-text-4: #C9CDD4;

    --c-brand: #3370FF;
    --c-brand-light: #EDF2FF;
    --c-brand-border: #BEDAFF;

    --c-warn: #E8684A;
    --c-warn-light: #FFF3F0;
    --c-warn-border: #FDCDC5;

    --c-orange: #D97706;
    --c-orange-light: #FFFBEB;
    --c-orange-border: #FDE68A;

    --c-green: #0F9D58;
    --c-green-light: #F0FDF4;

    --c-ai: #6D28D9;
    --c-ai-light: #F5F3FF;
    --c-ai-border: #DDD6FE;

    --c-sec: #1E40AF;
    --c-sec-light: #EFF6FF;
    --c-sec-border: #BFDBFE;

    --c-mem: #B45309;
    --c-mem-light: #FFFBEB;
    --c-mem-border: #FDE68A;

    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 14px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.08);
    --shadow-modal: 0 4px 12px rgba(0,0,0,.06), 0 20px 48px rgba(0,0,0,.12);
    --transition: 180ms cubic-bezier(.4,0,.2,1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;

    --modal-px: 24px;
    --modal-section-gap: 12px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--c-bg); color: var(--c-text-1); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ── Control Panel ── */
  .panel { position: sticky; top: 0; z-index: 100; background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 20px 32px; }
  .panel-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; color: var(--c-text-1); margin-bottom: 14px; }
  .panel-rows { display: flex; flex-direction: column; gap: 10px; }
  .panel-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .ctrl { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 12px; font-weight: 500; color: var(--c-text-3); min-width: 56px; letter-spacing: .02em; }
  .seg { display: inline-flex; border: 1px solid var(--c-border); border-radius: var(--radius-s); overflow: hidden; }
  .seg button { padding: 5px 14px; font-size: 12px; font-weight: 500; font-family: var(--font); border: none; background: transparent; color: var(--c-text-3); cursor: pointer; transition: var(--transition); border-right: 1px solid var(--c-border); letter-spacing: .01em; }
  .seg button:last-child { border-right: none; }
  .seg button:hover:not(.on) { background: var(--c-bg); color: var(--c-text-2); }
  .seg button.on { background: var(--c-text-1); color: #fff; }

  /* ── Stage ── */
  .stage { display: flex; flex-direction: column; align-items: center; padding: 40px 24px 80px; min-height: calc(100vh - 120px); }

  .device-viewport {
    width: 100%;
    max-width: 480px;
    position: relative;
  }

  /* ── Mobile device preview ── */
  .device-mobile .stage { padding: 24px 16px 48px; }
  .device-mobile .device-viewport {
    max-width: 390px;
    width: 100%;
    min-height: min(780px, calc(100vh - 200px));
    background: var(--c-bg);
    border-radius: 24px;
    border: 1px solid var(--c-border);
    box-shadow: 0 12px 40px rgba(15, 23, 42, .12);
    overflow: hidden;
    --modal-px: 14px;
    --modal-section-gap: 10px;
  }
  .device-mobile .device-statusbar {
    height: 28px;
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .device-mobile .device-statusbar span {
    width: 72px;
    height: 5px;
    border-radius: 999px;
    background: var(--c-border);
  }
  .device-mobile .device-content {
    padding: 16px 12px 24px;
    min-height: calc(100% - 28px);
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .device-pc .device-statusbar,
  .device-pc .device-content { display: contents; }

  .device-mobile .flow { flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .device-mobile .banner-wrap { max-width: none; }
  .device-mobile .banner { flex-wrap: wrap; gap: 10px; }
  .device-mobile .banner-cta { width: 100%; text-align: center; padding: 8px 14px; }

  /* Mobile: centered modals (compact) */
  .device-mobile .m-wrap,
  .device-mobile .cf-wrap {
    width: 100%;
    max-width: none;
  }
  .device-mobile .m-wrap.show,
  .device-mobile .cf-wrap.show,
  .device-mobile .cmp-wrap.show {
    padding: 28px 22px;
  }
  .device-mobile .m-wrap.show,
  .device-mobile .cf-wrap.show {
    position: absolute;
    inset: 0;
    z-index: 120;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, .45);
  }
  .device-mobile .m-wrap .modal,
  .device-mobile .cf-wrap .cf {
    width: calc(100% - 8px);
    max-width: 320px;
    max-height: 72%;
    overflow-x: hidden;
    overflow-y: auto;
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(15, 23, 42, .16);
  }
  .device-mobile .cf-wrap.cf-wrap--fallback .cf {
    max-width: 300px;
  }

  /* Mobile modal — typography & spacing */
  .device-mobile .modal .m-close,
  .device-mobile .cf .m-close {
    top: 8px;
    right: 10px;
    width: 24px;
    height: 24px;
    font-size: 12px;
  }
  .device-mobile .as-title,
  .device-mobile .cf-title-warn {
    font-size: 16px;
    font-weight: 700;
    padding: 14px 36px 0 var(--modal-px);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .device-mobile .as-subtitle {
    font-size: 12px;
    margin-bottom: 10px;
    line-height: 1.45;
  }
  .device-mobile .fallback-modal {
    padding: 20px var(--modal-px) 0;
  }
  .device-mobile .fallback-title {
    font-size: 15px;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .device-mobile .fallback-body {
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 18px;
    max-width: none;
    padding: 0;
  }
  .device-mobile .fallback-cta { padding-bottom: 10px; }
  .device-mobile .fallback-cta .renew-btn { min-height: 40px; border-radius: 8px; }
  .device-mobile .fallback-modal .as-links { padding-bottom: 14px; }

  .device-mobile .impact-box {
    margin: 0 var(--modal-px) var(--modal-section-gap);
    padding: 0 10px;
    border-radius: 8px;
  }
  .device-mobile .impact-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    grid-template-rows: auto auto;
    gap: 2px 8px;
    align-items: start;
    padding: 10px 0;
  }
  .device-mobile .impact-icon {
    width: 28px;
    height: 28px;
    grid-row: 1 / 3;
    border-radius: 6px;
  }
  .device-mobile .impact-icon svg { width: 14px; height: 14px; }
  .device-mobile .impact-title {
    font-size: 12px;
    font-weight: 600;
    grid-column: 2;
    line-height: 1.35;
  }
  .device-mobile .impact-effect {
    grid-column: 2;
    max-width: none;
    text-align: left;
    font-size: 11px;
    line-height: 1.45;
    color: var(--c-text-3);
  }

  .device-mobile .as-more {
    font-size: 11px;
    padding: 2px 0 6px;
  }
  .device-mobile .impact-box .as-more {
    margin: 0 -10px -2px;
    padding: 8px 0 7px;
  }
  .device-mobile .as-cta {
    padding: 0 var(--modal-px) 8px;
  }
  .device-mobile .as-cta .renew-btn-wrap { padding-top: 0; }
  .device-mobile .as-cta .renew-btn-wrap--plain {
    padding-top: 8px;
    padding-bottom: 2px;
  }
  .device-mobile .renew-btn {
    padding: 12px 12px 8px;
    border-radius: 8px;
  }
  .device-mobile .renew-btn.renew-btn--plain {
    min-height: 40px;
    padding: 0 12px;
  }
  .device-mobile .renew-btn.renew-btn--plain > span { font-size: 14px; }
  .device-mobile .renew-btn-line1 { font-size: 14px; gap: 6px; }
  .device-mobile .renew-badge-countdown {
    height: 18px;
    font-size: 9px;
    padding: 0 8px;
    right: 6px;
    top: -2px;
  }
  .device-mobile .as-links {
    padding: 0 var(--modal-px) 14px;
  }
  .device-mobile .as-links .btn-secondary {
    height: 34px;
    font-size: 12px;
  }

  .device-mobile .cf-fallback-list {
    margin: 0 var(--modal-px) 12px;
  }
  .device-mobile .cf-fallback-item {
    font-size: 12px;
    line-height: 1.5;
    padding-left: 12px;
  }
  .device-mobile .cf-fallback-item + .cf-fallback-item { margin-top: 8px; }
  .device-mobile .cf-fallback-item::before {
    width: 4px;
    height: 4px;
    top: 0.55em;
  }
  .device-mobile .abandon {
    padding: 0 var(--modal-px) 12px;
  }
  .device-mobile .cf-check-row { padding: 0 var(--modal-px); }
  .device-mobile .abandon-check {
    font-size: 12px;
    gap: 6px;
    margin: 8px 0 8px;
  }
  .device-mobile .abandon-check input {
    width: 14px;
    height: 14px;
  }
  .device-mobile .btn-abandon {
    height: 34px;
    font-size: 12px;
  }

  .device-mobile .cmp-wrap {
    position: absolute;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .device-mobile .cmp-page {
    width: calc(100% - 8px);
    max-width: 336px;
    max-height: 72%;
    border-radius: 12px;
    box-shadow: 0 8px 28px rgba(15, 23, 42, .16);
    animation: none;
  }
  .device-mobile .cmp-hdr {
    padding: 12px 36px 0;
    min-height: 38px;
  }
  .device-mobile .cmp-hdr-title { font-size: 14px; }
  .device-mobile .cmp-close {
    width: 24px;
    height: 24px;
    right: 10px;
    top: 10px;
    font-size: 14px;
  }
  .device-mobile .cmp-notice-wrap {
    padding: 8px 12px 10px;
  }
  .device-mobile .cmp-notice {
    padding: 8px 10px;
    font-size: 11px;
    line-height: 1.5;
    border-radius: 6px;
  }
  .device-mobile .cmp-notice-ico svg { width: 14px; height: 14px; }
  .device-mobile .cmp-head {
    margin: 0 10px;
    border-radius: 8px;
    grid-template-columns: minmax(64px, 1fr) repeat(4, minmax(72px, 1fr));
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    min-width: calc(100% - 20px);
    width: max-content;
    max-width: calc(100% - 20px);
  }
  .device-mobile .cmp-plan-col { padding: 6px 4px 8px; }
  .device-mobile .cmp-plan-name { font-size: 12px; }
  .device-mobile .cmp-plan-desc { font-size: 9px; min-height: 18px; }
  .device-mobile .cmp-plan-price .price-num { font-size: 13px; }
  .device-mobile .cmp-buy {
    min-width: 68px;
    height: 24px;
    font-size: 10px;
    padding: 0 8px;
  }
  .device-mobile .cmp-body {
    padding: 0 10px 12px;
    margin-top: 8px;
  }
  .device-mobile .cmp-fallback-table { margin: 0 10px 12px; }
  .device-mobile .cmp-fallback-hd > span,
  .device-mobile .cmp-fallback-row > span {
    padding: 8px 10px;
    font-size: 11px;
    min-height: 36px;
  }
  .device-mobile .cmp-fallback-name { font-size: 12px; }
  .device-mobile .cmp-row .cmp-cell,
  .device-mobile .cmp-cat-cell { font-size: 11px; padding: 8px 6px; }

  .device-pc .m-wrap.show,
  .device-pc .cf-wrap.show { display: block; }

  /* ── Flow Steps ── */
  .flow { display: none; align-items: center; gap: 6px; margin-bottom: 24px; font-size: 12px; color: var(--c-text-3); }
  .flow.show { display: flex; }
  .flow-step { padding: 4px 12px; border-radius: 20px; font-weight: 500; cursor: pointer; transition: var(--transition); background: var(--c-bg); border: 1px solid var(--c-border); }
  .flow-step.current { background: var(--c-text-1); color: #fff; border-color: var(--c-text-1); }
  .flow-step.done { background: var(--c-green-light); color: var(--c-green); border-color: #BBF7D0; }
  .flow-arr { color: var(--c-text-4); font-size: 14px; }

  /* ── Banner ── */
  .banner-wrap { display: none; width: 100%; max-width: 520px; }
  .banner { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: var(--radius-m); background: var(--c-surface); border: 1px solid var(--c-border); box-shadow: var(--shadow-card); }
  .banner-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .t-default .banner-dot { background: var(--c-brand); }
  .t-ai .banner-dot { background: var(--c-ai); }
  .t-sec .banner-dot { background: var(--c-sec); }
  .t-mem .banner-dot { background: var(--c-mem); }
  .banner-body { flex: 1; font-size: 13px; color: var(--c-text-2); }
  .banner-body strong { font-weight: 600; color: var(--c-text-1); }
  .banner-body .hl { font-weight: 600; }
  .t-default .banner-body .hl { color: var(--c-brand); }
  .t-ai .banner-body .hl { color: var(--c-ai); }
  .t-sec .banner-body .hl { color: var(--c-sec); }
  .t-mem .banner-body .hl { color: var(--c-orange); }
  .banner-cta { padding: 6px 14px; border-radius: var(--radius-s); font-size: 12px; font-weight: 600; font-family: var(--font); border: none; color: #fff; cursor: pointer; white-space: nowrap; transition: var(--transition); }
  .banner-cta:active { transform: scale(.97); }
  .t-default .banner-cta { background: var(--c-brand); }
  .t-ai .banner-cta { background: var(--c-ai); }
  .t-sec .banner-cta { background: var(--c-sec); }
  .t-mem .banner-cta { background: var(--c-mem); }
  .banner-x { width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; color: var(--c-text-4); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .banner-x:hover { background: var(--c-bg); color: var(--c-text-3); }

  /* ── Modal Shell ── */
  .m-wrap { display: none; width: 100%; max-width: 480px; }
  .m-wrap.show { display: block; }
  .modal { background: var(--c-surface); border-radius: var(--radius-l); box-shadow: var(--shadow-modal); overflow: hidden; position: relative; }

  /* ── Shared modal elements ── */
  .m-bar { height: 3px; }
  .t-default .m-bar { background: var(--c-brand); }
  .t-ai .m-bar { background: linear-gradient(90deg, #7C3AED, #A78BFA); }
  .t-sec .m-bar { background: linear-gradient(90deg, var(--c-sec), #3B82F6); }
  .t-mem .m-bar { background: linear-gradient(90deg, var(--c-mem), #F59E0B); }

  .m-close {
    position: absolute; top: 12px; right: 14px; z-index: 2;
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: var(--c-bg); color: var(--c-text-3);
    cursor: pointer; font-size: 14px; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .m-close:hover { background: var(--c-border); color: var(--c-text-2); }
  .m-close:active { transform: scale(.94); }

  /* ─────────────────────────────────────────────────────────
     ADMIN SOON LAYOUT
  ───────────────────────────────────────────────────────── */

  /* Modal name */
  .as-name {
    display: flex; align-items: center; gap: 6px;
    padding: 16px 48px 0 20px; margin-bottom: 12px;
    font-size: 13px; font-weight: 600; color: var(--c-brand);
  }
  .as-name svg { flex-shrink: 0; }

  /* Title */
  .as-title {
    font-size: 18px; font-weight: 800; letter-spacing: -.02em;
    line-height: 1.35; color: var(--c-text-1);
    padding: 18px 48px 0 var(--modal-px); margin-bottom: 8px;
  }

  /* Subtitle */
  .as-subtitle {
    padding: 0 var(--modal-px); margin-bottom: 14px;
    font-size: 13px; color: var(--c-text-3); line-height: 1.5;
  }

  /* Fallback modal — centered layout */
  .modal-fallback { text-align: center; }
  .fallback-modal {
    padding: 32px var(--modal-px) 0;
  }
  .fallback-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--c-text-1);
    line-height: 1.5;
    margin-bottom: 18px;
    padding: 0 8px;
  }
  .fallback-title .hl { font-weight: 700; }
  .t-default .fallback-title .hl { color: var(--c-warn); }
  .t-ai .fallback-title .hl { color: var(--c-ai); }
  .t-sec .fallback-title .hl { color: var(--c-sec); }
  .t-mem .fallback-title .hl { color: var(--c-orange); }
  .fallback-body {
    font-size: 15px;
    font-weight: 400;
    color: var(--c-text-3);
    line-height: 1.7;
    margin: 0 auto 32px;
    padding: 0 12px;
    max-width: 360px;
  }
  .fallback-cta {
    padding: 0 0 16px;
  }
  .fallback-cta .renew-btn-wrap { padding-top: 0; }
  .fallback-cta .renew-btn {
    background: linear-gradient(90deg, #4F6EF7 0%, #5865F8 50%, #6B6AF7 100%);
    min-height: 48px;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(82, 102, 241, .32);
  }
  .fallback-modal .as-links { padding-bottom: 22px; }
  .modal-fallback .m-body {
    text-align: center;
    padding: 32px var(--modal-px) 0;
  }
  .modal-fallback .m-head { margin-bottom: 0; }
  .modal-fallback .m-impacts { display: none; }
  .modal-fallback .m-cta { padding-top: 0; }

  .cf-buffer-hl { font-weight: 700; color: var(--c-warn); }
  .as-title .hl { font-weight: 800; }
  .t-default .as-title .hl { color: var(--c-warn); }
  .t-ai .as-title .hl { color: var(--c-ai); }
  .t-sec .as-title .hl { color: var(--c-sec); }
  .t-mem .as-title .hl { color: var(--c-orange); }

  /* Context line */
  .as-context {
    margin: 0 20px 16px; padding: 0;
    font-size: 12px; color: var(--c-text-4); line-height: 1.5;
  }
  .as-context strong { font-weight: 500; color: var(--c-text-3); }

  /* Section header */
  .as-section-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; margin-bottom: 10px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
  }
  .as-section-left {
    display: flex; align-items: center; gap: 6px;
  }
  .as-section-left svg { flex-shrink: 0; }
  .as-section-right {
    font-size: 12px; font-weight: 400; color: var(--c-text-3);
  }

  /* Impact cards */
  .as-impacts { padding: 0 20px; margin-bottom: 6px; }
  .as-impact {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 14px; margin-bottom: 6px;
    border-radius: var(--radius-s);
    border-left: 3px solid;
    background: var(--c-bg);
  }
  .as-impact:last-child { margin-bottom: 0; }
  .t-default .as-impact { border-left-color: var(--c-brand); }
  .t-ai .as-impact { border-left-color: var(--c-ai); }
  .t-sec .as-impact { border-left-color: var(--c-sec); }
  .t-mem .as-impact { border-left-color: var(--c-orange); }
  .as-impact-left { flex: 1; min-width: 0; }
  .as-impact-hd {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
    margin-bottom: 2px;
  }
  .as-impact-hd svg { color: var(--c-text-3); flex-shrink: 0; }
  .as-impact-desc { font-size: 12px; color: var(--c-text-2); line-height: 1.4; }
  .as-impact-data {
    flex-shrink: 0; font-size: 12px; font-weight: 600;
    text-align: right; white-space: nowrap;
  }
  .t-default .as-impact-data { color: var(--c-brand); }
  .t-ai .as-impact-data { color: var(--c-ai); }
  .t-sec .as-impact-data { color: var(--c-sec); }
  .t-mem .as-impact-data { color: var(--c-orange); }

  /* Expired alert banner */
  .as-alert {
    display: flex; align-items: center; gap: 8px;
    margin: 0 20px 14px; padding: 8px 12px;
    border-radius: var(--radius-s);
    background: var(--c-warn-light); border: 1px solid var(--c-warn-border);
    font-size: 12px; font-weight: 500; color: var(--c-warn);
  }
  .as-alert svg { flex-shrink: 0; }

  /* Impact list box（临期 / 过期共用） */
  .impact-box {
    margin: 0 var(--modal-px) var(--modal-section-gap);
    padding: 2px 14px;

  .cmp-x { color: var(--c-text-4); }

  .cmp-expand {

  /* CTA */

    font-weight: 600;

  /* ─────────────────────────────────────────────────────────
     STANDARD LAYOUT (非超管临期 的其他场景)
  ───────────────────────────────────────────────────────── */
  .m-body { padding: 18px var(--modal-px) 14px; }

  .m-head { margin-bottom: 6px; }

  .t-sec .m-value { background: var(--c-sec-light); color: var(--c-sec); border-color: var(--c-sec-border); }

  .impact-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 7px; flex-shrink: 0; }

        ${rows}
      </div>`;
    $('cfTitle').textContent = D.cfTitle[S.type] || '确认暂不续费？';
    $('cfSubtitle').innerHTML = `确认后将进入<span class="cf-buffer-hl">${FALLBACK.bufferDays}天缓冲期</span>倒计时，届时以下权益将被回收：`;
    $('cfCta').innerHTML = buildRenewBtnHTML({ id: 'cfBtn', action: '不放弃，我要续费' });
    $('abBtn').textContent = '确认放弃，进入缓冲期';
    const ck = $('abCheck');
    if (ck) { ck.checked = false; togAbandon(); }
  }
}

function togAbandon() {
  const b = $('abBtn');
  const ck = $('abCheck');
  if (!b || !ck) return;
  if (ck.checked) {
    b.disabled = false;
    b.classList.add('ok');
  } else {
    b.disabled = true;
    b.classList.remove('ok');
  }
}

function render() {
  applyDevice();
  step = 1;
  const { type, days, theme, role } = S;
  const isBanner = isSoon() && days === '60';
  const exp = isExp();
  const thCls = tc(theme);

  $('flow').className = (isAdminExp()) ? 'flow show' : 'flow';
  $('fs1').className = 'flow-step current'; $('fs2').className = 'flow-step';
  $('cfWrap').classList.remove('show');
  $('cfWrap').classList.remove('cf-wrap--fallback');
  $('cmpWrap').classList.remove('show');
  document.body.style.overflow = '';

  $('bannerWrap').style.display = isBanner ? 'block' : 'none';
  const mw = $('mWrap');
  if (isBanner) { mw.classList.remove('show'); return; }
  mw.classList.add('show');

  // banner content (always update)
  const bnr = $('banner');
  bnr.className = `banner ${thCls}`;
  $('bannerBody').innerHTML = D.banner[theme](days);
  $('bannerCta').textContent = role === 'admin' ? '查看续费方案' : '通知管理员';

  // modal content
  const modal = $('modal');
  const fbCls = isFallback() ? ' modal-fallback' : '';
  if (isAdminSoon()) {
    modal.className = `modal ${thCls}${fbCls}`;
    modal.innerHTML = buildAdminSoonHTML();
  } else if (isAdminExp()) {
    modal.className = `modal ${thCls}${fbCls} expired`;
    modal.innerHTML = buildAdminExpHTML();
  } else {
    modal.innerHTML = buildStandardHTML();
    populateStandard();
  }

  // days control opacity
  const dg = document.querySelector('[data-k="days"]');
  dg.style.opacity = isSoon() ? '1' : '.35';
  dg.style.pointerEvents = isSoon() ? 'auto' : 'none';
}

function $(id) { return document.getElementById(id); }

/* ── Event delegation ── */
document.addEventListener('click', e => {
  // Primary button
  const btnMain = e.target.closest('#btnMain');
  if (btnMain) {
    if (S.role === 'member') {
      const notifyOk = $('notifyOk');
      if (notifyOk) notifyOk.style.display = 'flex';
      const span = btnMain.querySelector('span');
      if (span) span.textContent = '已通知';
    }
  }
  // Remind / snooze → step 2 (expired only)
  const remindLink = e.target.closest('#remindLink');
  if (remindLink && isExp() && S.role === 'admin') {
    e.preventDefault();
    goStep(2);
  }
});

/* ── Seg controls ── */
document.querySelectorAll('.seg').forEach(g => {
  const k = g.dataset.k;
  g.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      g.querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      S[k] = b.dataset.v;
      render();
    });
  });
});

const svgX = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M5 5l4 4M9 5l-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`;
const svgCk = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 7 6.5 9l3-3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function cellHtml(v) {
  if (v === '×') return `<span class="cmp-x">${svgX}</span>`;
  if (v === '✓') return `<span class="cmp-check">${svgCk}</span>`;
  return `<span class="cmp-val-hl">${v}</span>`;

function renderCmpPage() {
  if (isFallback()) {
    const rows = FALLBACK.risks.map(r => `
      <div class="cmp-fallback-row">
        <span class="cmp-fallback-name">${r.name}<span class="cmp-fallback-tag">观测权益</span></span>
        <span class="cmp-fallback-status"><span class="cf-status-dot"></span>${r.status}</span>
        <span class="cmp-fallback-impact">${r.impact}</span>
      </div>`).join('');
    $('cmpBody').innerHTML = `
      <div class="cmp-fallback-table">
        <div class="cmp-fallback-hd">
          <span>权益信息</span>
          <span>当前状态</span>
          <span>${isExp() ? '到期影响' : '到期后影响'}</span>
        </div>
        ${rows}
      </div>`;
    return;
  }

  $('cmpBody').innerHTML = CMP_TABLE.map(cat => {
    const [cPaid,cFree,cAdv,cFlag] = cat.counts;

      <div class="cmp-cat-cell">${cat.cat}</div>

      <div class="cmp-cell">${r.name}</div>

      <div class="cmp-cell">${cellHtml(r.adv)}</div>
      <div class="cmp-cell">${cellHtml(r.flag)}</div>

  }).join('') + `<button class="cmp-expand">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5.5v5M5.5 8h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

  exp: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.25" stroke="currentColor" stroke-width="1.4"/><path d="M8 5.2v3.6M8 11.1h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`,
};

function renderCmpNotice() {
  const plan = CMP_PLAN[S.theme] || CMP_PLAN.default;
  const notice = $('cmpNotice');
  const ico = $('cmpNoticeIco');
  const text = $('cmpNoticeText');
  if (isFallback()) {
    if (isExp()) {
      notice.className = 'cmp-notice cmp-notice-exp';
      ico.innerHTML = CMP_NOTICE_ICO.exp;
      text.innerHTML = FALLBACK.cmpNotice.exp;
    } else {
      const days = S.days || '14';
      notice.className = 'cmp-notice cmp-notice-soon';
      ico.innerHTML = CMP_NOTICE_ICO.soon;
      text.innerHTML = FALLBACK.cmpNotice.soon(days);
    }
    return;
  }
  if (isExp()) {
    notice.className = 'cmp-notice cmp-notice-exp';
    ico.innerHTML = CMP_NOTICE_ICO.exp;
    text.innerHTML = `您的${plan}套餐<span class="hl">已到期</span>，以下权益已受到影响。续费可立即恢复所有权益。`;
  } else {
    const days = S.days || '14';
    notice.className = 'cmp-notice cmp-notice-soon';
    ico.innerHTML = CMP_NOTICE_ICO.soon;
    text.innerHTML = `您的${plan}套餐将在 <span class="hl">${days}天后到期</span>，届时以下权益将受到影响。续期可完整保留所有权益。`;
  }
}

function showCmpPage() {
  $('cmpWrap').classList.add('show');
  document.body.style.overflow = 'hidden';
  $('cmpHead').style.display = isFallback() ? 'none' : '';
  if (isFallback()) {
    renderCmpNotice();
    renderCmpPage();
    return;
  }
  if (isExp()) {
    $('cmpHeadFn').textContent = '权益信息';
    $('cmpPlanCol1').classList.add('cmp-plan-col-label-only');
    $('cmpPlanTagWrap1').style.display = 'none';
    $('cmpPlanDesc1').style.display = 'none';
    $('cmpPlanPrice1').style.display = 'none';
    $('cmpPlanAction1').style.display = 'none';
    $('cmpPlanName1').textContent = '当前权益';
    $('cmpTag2').textContent = '已过期套餐';
    $('cmpTag2').className = 'cmp-col-tag cmp-tag-gold';
  } else {
    $('cmpHeadFn').textContent = '权益';
    $('cmpPlanCol1').classList.remove('cmp-plan-col-label-only');
    $('cmpPlanTagWrap1').style.display = '';
    $('cmpPlanDesc1').style.display = '';
    $('cmpPlanPrice1').style.display = '';
    $('cmpPlanAction1').style.display = '';
    $('cmpPlanName1').textContent = '体验版';
    $('cmpTag1').textContent = '过期后';
    $('cmpTag1').className = 'cmp-col-tag cmp-tag-gold';
    $('cmpTag2').textContent = '当前套餐';
    $('cmpTag2').className = 'cmp-col-tag cmp-tag-brand';
  }
  renderCmpNotice();
  renderCmpPage();
}

function hideCmpPage() {
  $('cmpWrap').classList.remove('show');
  document.body.style.overflow = '';
}

$('cmpMask').addEventListener('click', hideCmpPage);
