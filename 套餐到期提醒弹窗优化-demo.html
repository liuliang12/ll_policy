<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>套餐/权益包到期提醒弹窗优化 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --c-bg: #F7F8FA;
    --c-surface: #FFFFFF;
    --c-border: #E8E9ED;
    --c-border-light: #F0F1F3;
    --c-text-1: #1D2129;
    --c-text-2: #4E5969;
    --c-text-3: #86909C;
    --c-text-4: #C9CDD4;

    --c-brand: #3370FF;
    --c-brand-light: #EDF2FF;
    --c-brand-border: #BEDAFF;

    --c-warn: #E8684A;
    --c-warn-light: #FFF3F0;
    --c-warn-border: #FDCDC5;

    --c-orange: #D97706;
    --c-orange-light: #FFFBEB;
    --c-orange-border: #FDE68A;

    --c-green: #0F9D58;
    --c-green-light: #F0FDF4;

    --c-ai: #6D28D9;
    --c-ai-light: #F5F3FF;
    --c-ai-border: #DDD6FE;

    --c-sec: #1E40AF;
    --c-sec-light: #EFF6FF;
    --c-sec-border: #BFDBFE;

    --c-mem: #B45309;
    --c-mem-light: #FFFBEB;
    --c-mem-border: #FDE68A;

    --radius-s: 6px;
    --radius-m: 10px;
    --radius-l: 14px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.08);
    --shadow-modal: 0 4px 12px rgba(0,0,0,.06), 0 20px 48px rgba(0,0,0,.12);
    --transition: 180ms cubic-bezier(.4,0,.2,1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--c-bg); color: var(--c-text-1); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* ── Control Panel ── */
  .panel { position: sticky; top: 0; z-index: 100; background: var(--c-surface); border-bottom: 1px solid var(--c-border); padding: 20px 32px; }
  .panel-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; color: var(--c-text-1); margin-bottom: 14px; }
  .panel-rows { display: flex; flex-direction: column; gap: 10px; }
  .panel-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .ctrl { display: flex; align-items: center; gap: 8px; }
  .ctrl-label { font-size: 12px; font-weight: 500; color: var(--c-text-3); min-width: 56px; letter-spacing: .02em; }
  .seg { display: inline-flex; border: 1px solid var(--c-border); border-radius: var(--radius-s); overflow: hidden; }
  .seg button { padding: 5px 14px; font-size: 12px; font-weight: 500; font-family: var(--font); border: none; background: transparent; color: var(--c-text-3); cursor: pointer; transition: var(--transition); border-right: 1px solid var(--c-border); letter-spacing: .01em; }
  .seg button:last-child { border-right: none; }
  .seg button:hover:not(.on) { background: var(--c-bg); color: var(--c-text-2); }
  .seg button.on { background: var(--c-text-1); color: #fff; }

  /* ── Stage ── */
  .stage { display: flex; flex-direction: column; align-items: center; padding: 40px 24px 80px; min-height: calc(100vh - 120px); }

  /* ── Flow Steps ── */
  .flow { display: none; align-items: center; gap: 6px; margin-bottom: 24px; font-size: 12px; color: var(--c-text-3); }
  .flow.show { display: flex; }
  .flow-step { padding: 4px 12px; border-radius: 20px; font-weight: 500; cursor: pointer; transition: var(--transition); background: var(--c-bg); border: 1px solid var(--c-border); }
  .flow-step.current { background: var(--c-text-1); color: #fff; border-color: var(--c-text-1); }
  .flow-step.done { background: var(--c-green-light); color: var(--c-green); border-color: #BBF7D0; }
  .flow-arr { color: var(--c-text-4); font-size: 14px; }

  /* ── Banner ── */
  .banner-wrap { display: none; width: 100%; max-width: 520px; }
  .banner { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: var(--radius-m); background: var(--c-surface); border: 1px solid var(--c-border); box-shadow: var(--shadow-card); }
  .banner-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .t-default .banner-dot { background: var(--c-brand); }
  .t-ai .banner-dot { background: var(--c-ai); }
  .t-sec .banner-dot { background: var(--c-sec); }
  .t-mem .banner-dot { background: var(--c-mem); }
  .banner-body { flex: 1; font-size: 13px; color: var(--c-text-2); }
  .banner-body strong { font-weight: 600; color: var(--c-text-1); }
  .banner-body .hl { font-weight: 600; }
  .t-default .banner-body .hl { color: var(--c-brand); }
  .t-ai .banner-body .hl { color: var(--c-ai); }
  .t-sec .banner-body .hl { color: var(--c-sec); }
  .t-mem .banner-body .hl { color: var(--c-orange); }
  .banner-cta { padding: 6px 14px; border-radius: var(--radius-s); font-size: 12px; font-weight: 600; font-family: var(--font); border: none; color: #fff; cursor: pointer; white-space: nowrap; transition: var(--transition); }
  .banner-cta:active { transform: scale(.97); }
  .t-default .banner-cta { background: var(--c-brand); }
  .t-ai .banner-cta { background: var(--c-ai); }
  .t-sec .banner-cta { background: var(--c-sec); }
  .t-mem .banner-cta { background: var(--c-mem); }
  .banner-x { width: 24px; height: 24px; border-radius: 50%; border: none; background: transparent; color: var(--c-text-4); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
  .banner-x:hover { background: var(--c-bg); color: var(--c-text-3); }

  /* ── Modal Shell ── */
  .m-wrap { display: none; width: 100%; max-width: 420px; }
  .m-wrap.show { display: block; }
  .modal { background: var(--c-surface); border-radius: var(--radius-l); box-shadow: var(--shadow-modal); overflow: hidden; position: relative; }

  /* ── Shared modal elements ── */
  .m-bar { height: 3px; }
  .t-default .m-bar { background: var(--c-brand); }
  .t-ai .m-bar { background: linear-gradient(90deg, #7C3AED, #A78BFA); }
  .t-sec .m-bar { background: linear-gradient(90deg, var(--c-sec), #3B82F6); }
  .t-mem .m-bar { background: linear-gradient(90deg, var(--c-mem), #F59E0B); }

  .m-close {
    position: absolute; top: 12px; right: 14px; z-index: 2;
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: var(--c-bg); color: var(--c-text-3);
    cursor: pointer; font-size: 14px; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .m-close:hover { background: var(--c-border); color: var(--c-text-2); }
  .m-close:active { transform: scale(.94); }

  /* ─────────────────────────────────────────────────────────
     ADMIN SOON LAYOUT
  ───────────────────────────────────────────────────────── */

  /* Modal name */
  .as-name {
    display: flex; align-items: center; gap: 6px;
    padding: 16px 48px 0 20px; margin-bottom: 12px;
    font-size: 13px; font-weight: 600; color: var(--c-brand);
  }
  .as-name svg { flex-shrink: 0; }

  /* Title */
  .as-title {
    font-size: 18px; font-weight: 800; letter-spacing: -.02em;
    line-height: 1.35; color: var(--c-text-1);
    padding: 0 48px 0 20px; margin-bottom: 6px;
  }

  /* Subtitle */
  .as-subtitle {
    padding: 0 20px; margin-bottom: 18px;
    font-size: 13px; color: var(--c-text-3); line-height: 1.5;
  }
  .as-title .hl { font-weight: 800; }
  .t-default .as-title .hl { color: var(--c-warn); }
  .t-ai .as-title .hl { color: var(--c-ai); }
  .t-sec .as-title .hl { color: var(--c-sec); }
  .t-mem .as-title .hl { color: var(--c-orange); }

  /* Context line */
  .as-context {
    margin: 0 20px 16px; padding: 0;
    font-size: 12px; color: var(--c-text-4); line-height: 1.5;
  }
  .as-context strong { font-weight: 500; color: var(--c-text-3); }

  /* Section header */
  .as-section-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; margin-bottom: 10px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
  }
  .as-section-left {
    display: flex; align-items: center; gap: 6px;
  }
  .as-section-left svg { flex-shrink: 0; }
  .as-section-right {
    font-size: 12px; font-weight: 400; color: var(--c-text-3);
  }

  /* Impact cards */
  .as-impacts { padding: 0 20px; margin-bottom: 6px; }
  .as-impact {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 14px; margin-bottom: 6px;
    border-radius: var(--radius-s);
    border-left: 3px solid;
    background: var(--c-bg);
  }
  .as-impact:last-child { margin-bottom: 0; }
  .t-default .as-impact { border-left-color: var(--c-brand); }
  .t-ai .as-impact { border-left-color: var(--c-ai); }
  .t-sec .as-impact { border-left-color: var(--c-sec); }
  .t-mem .as-impact { border-left-color: var(--c-orange); }
  .as-impact-left { flex: 1; min-width: 0; }
  .as-impact-hd {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; font-weight: 700; color: var(--c-text-1);
    margin-bottom: 2px;
  }
  .as-impact-hd svg { color: var(--c-text-3); flex-shrink: 0; }
  .as-impact-desc { font-size: 12px; color: var(--c-text-2); line-height: 1.4; }
  .as-impact-data {
    flex-shrink: 0; font-size: 12px; font-weight: 600;
    text-align: right; white-space: nowrap;
  }
  .t-default .as-impact-data { color: var(--c-brand); }
  .t-ai .as-impact-data { color: var(--c-ai); }
  .t-sec .as-impact-data { color: var(--c-sec); }
  .t-mem .as-impact-data { color: var(--c-orange); }

  /* Expired alert banner */
  .as-alert {
    display: flex; align-items: center; gap: 8px;
    margin: 0 20px 14px; padding: 8px 12px;
    border-radius: var(--radius-s);
    background: var(--c-warn-light); border: 1px solid var(--c-warn-border);
    font-size: 12px; font-weight: 500; color: var(--c-warn);
  }
  .as-alert svg { flex-shrink: 0; }

  /* Expired impact style override */
  .modal.expired .as-impact { border-left-color: var(--c-warn); }
  .modal.expired .as-impact-data { color: var(--c-green); }
  .modal.expired .as-name { color: var(--c-warn); }
  .modal.expired .as-title .hl { color: var(--c-warn) !important; }

  /* More link */
  .as-more {
    display: flex; align-items: center; justify-content: center;
    gap: 4px; padding: 8px 20px 18px;
    font-size: 12px; font-weight: 500; color: var(--c-text-3);
    cursor: pointer; transition: color var(--transition);
  }
  .as-more:hover { color: var(--c-brand); }
  .as-more svg { flex-shrink: 0; }

  /* ─── Compare Page ─── */
  .cmp-wrap { display: none; width: 100%; max-width: 820px; }
  .cmp-wrap.show { display: block; }
  .cmp-page {
    background: var(--c-surface); border-radius: var(--radius-l);
    box-shadow: var(--shadow-modal); overflow: hidden;
  }
  .cmp-hdr {
    display: flex; align-items: center; gap: 8px;
    padding: 18px 20px; border-bottom: 1px solid var(--c-border);
  }
  .cmp-back {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--c-bg); color: var(--c-text-3); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition); flex-shrink: 0;
  }
  .cmp-back:hover { background: var(--c-border); color: var(--c-text-2); }
  .cmp-hdr-title { font-size: 14px; font-weight: 700; color: var(--c-text-1); }

  .cmp-cols {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: 1px solid var(--c-border);
  }
  .cmp-top-tags {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: none; margin-bottom: 0;
  }
  .cmp-top-tags .cmp-tag-cell {
    text-align: center; padding: 0 8px 4px;
  }
  .cmp-top-tags .cmp-tag-cell:first-child { padding: 0; }
  .cmp-col-tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 4px; letter-spacing: .02em;
  }
  .cmp-tag-brand { background: var(--c-brand); color: #fff; }
  .cmp-tag-warn { background: var(--c-warn); color: #fff; }

  .cmp-col-label {
    padding: 6px 12px 14px; text-align: center;
    font-size: 11px; color: var(--c-text-3);
  }
  .cmp-col-label:first-child { text-align: left; padding-left: 20px; }
  .cmp-col-name { font-size: 14px; font-weight: 700; color: var(--c-text-1); display: block; margin-top: 2px; }
  .cmp-col-desc { font-size: 10px; color: var(--c-text-3); display: block; margin-top: 2px; }
  .cmp-col-price { font-size: 11px; color: var(--c-text-2); margin-top: 4px; }
  .cmp-col-price .price-num { font-size: 18px; font-weight: 800; color: var(--c-text-1); }
  .cmp-col-fn { font-size: 13px; font-weight: 700; color: var(--c-text-1); display: flex; align-items: flex-end; padding-bottom: 16px !important; }
  .cmp-col-current { background: rgba(51,112,255,.04); }

  .cmp-buy {
    display: inline-flex; align-items: center; justify-content: center;
    margin-top: 8px; padding: 5px 16px; border-radius: var(--radius-s);
    border: 1.5px solid var(--c-text-1); background: transparent;
    font-size: 11px; font-weight: 600; font-family: var(--font);
    color: var(--c-text-1); cursor: pointer; transition: var(--transition);
  }
  .cmp-buy:hover { background: var(--c-text-1); color: #fff; }
  .cmp-buy-primary {
    background: var(--c-brand); color: #fff; border-color: var(--c-brand);
  }
  .cmp-buy-primary:hover { background: var(--c-brand); filter: brightness(.9); color: #fff; }

  .cmp-body { max-height: 400px; overflow-y: auto; }

  .cmp-cat {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    background: var(--c-bg); border-bottom: 1px solid var(--c-border);
    font-size: 12px; font-weight: 700; color: var(--c-text-1);
  }
  .cmp-cat-cell { padding: 10px 12px; display: flex; align-items: center; justify-content: center; }
  .cmp-cat-cell:first-child { padding-left: 20px; justify-content: flex-start; }
  .cmp-cat-count { font-weight: 500; color: var(--c-text-3); }

  .cmp-row {
    display: grid; grid-template-columns: minmax(120px,1.2fr) repeat(4,1fr);
    border-bottom: 1px solid var(--c-border-light);
    font-size: 12px; color: var(--c-text-2);
    transition: background var(--transition);
  }
  .cmp-row:hover { background: #FAFBFC; }
  .cmp-cell { padding: 10px 12px; display: flex; align-items: center; }
  .cmp-cell:first-child { padding-left: 20px; color: var(--c-text-1); font-weight: 500; }
  .cmp-cell:not(:first-child) { justify-content: center; }
  .cmp-cell:nth-child(3) { background: rgba(51,112,255,.03); }
  .cmp-cat-cell:nth-child(3) { background: rgba(51,112,255,.05); }
  .cmp-top-tags .cmp-tag-cell:nth-child(3) { background: var(--c-brand-light); border-radius: var(--radius-m) var(--radius-m) 0 0; }

  .cmp-x { color: var(--c-text-4); }
  .cmp-check { color: var(--c-brand); }
  .cmp-val-hl { color: var(--c-brand); font-weight: 600; }

  .cmp-expand {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 20px; font-size: 12px; font-weight: 600;
    color: var(--c-text-2); cursor: pointer; border: none;
    background: none; font-family: var(--font);
    transition: color var(--transition);
  }
  .cmp-expand:hover { color: var(--c-brand); }
  .cmp-expand svg { flex-shrink: 0; }

  /* CTA */
  .as-cta { padding: 0 20px 16px; }
  .btn-as {
    width: 100%; height: 48px; border-radius: 10px;
    border: none; font-size: 15px; font-weight: 600; font-family: var(--font);
    color: #fff; cursor: pointer; transition: all .2s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: .01em;
  }
  .btn-as:hover { filter: brightness(.93); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(51,112,255,.3); }
  .btn-as:active { transform: scale(.98) translateY(0); box-shadow: none; }
  .t-default .btn-as { background: var(--c-brand); }
  .t-ai .btn-as { background: var(--c-ai); }
  .t-sec .btn-as { background: var(--c-sec); }
  .t-mem .btn-as { background: var(--c-mem); }
  .btn-as svg { flex-shrink: 0; }

  /* Bottom links */
  .as-links {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; font-size: 12px; padding: 0 20px 20px;
  }
  .as-links .sep { width: 1px; height: 12px; background: var(--c-border); }

  .as-links .link-info {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--c-text-3); font-weight: 500;
    cursor: default; transition: color var(--transition);
  }
  .as-links .link-info:hover { color: var(--c-text-2); }
  .as-links .link-info svg { flex-shrink: 0; }

  .as-popover-tip {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-m); box-shadow: var(--shadow-l);
    padding: 10px 14px; white-space: nowrap;
    font-size: 12px; color: var(--c-text-2); z-index: 10;
  }
  .as-popover:hover .as-popover-tip { display: block; }

  .as-popover { position: relative; display: inline-flex; }
  .as-popover-trigger {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--c-text-3); text-decoration: none; font-weight: 500;
    cursor: pointer; transition: color var(--transition);
  }
  .as-popover-trigger:hover { color: var(--c-text-2); }
  .as-popover-trigger svg { flex-shrink: 0; }

  .as-popover-card {
    display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%);
    background: var(--c-surface); border: 1px solid var(--c-border);
    border-radius: var(--radius-m); box-shadow: var(--shadow-card);
    z-index: 20; min-width: 140px;
  }
  .as-popover:hover .as-popover-card { display: block; }

  .as-qr-placeholder {
    display: flex; align-items: center; justify-content: center;
    width: 140px; height: 140px; margin: 16px auto 8px;
    background: var(--c-bg); border-radius: var(--radius-s);
  }
  .as-qr-text {
    text-align: center; font-size: 11px; color: var(--c-text-3);
    padding: 0 12px 14px; line-height: 1.4;
  }

  .as-remind-opts { padding: 4px 0; min-width: 160px; }
  .as-remind-opt {
    display: block; padding: 8px 16px; font-size: 12px; font-weight: 500;
    color: var(--c-text-1); text-decoration: none; cursor: pointer;
    transition: background var(--transition); white-space: nowrap;
  }
  .as-remind-opt:hover { background: var(--c-bg); }

  /* ─────────────────────────────────────────────────────────
     STANDARD LAYOUT (非超管临期 的其他场景)
  ───────────────────────────────────────────────────────── */
  .m-body { padding: 0 20px 16px; }

  .m-head { margin-bottom: 6px; }
  .m-title { font-size: 18px; font-weight: 800; letter-spacing: -.02em; line-height: 1.35; color: var(--c-text-1); }
  .m-title .hl { font-weight: 700; }
  .t-default .m-title .hl { color: var(--c-warn); }
  .t-ai .m-title .hl { color: var(--c-ai); }
  .t-sec .m-title .hl { color: var(--c-sec); }
  .t-mem .m-title .hl { color: var(--c-orange); }
  .m-title.expired .hl { color: var(--c-warn) !important; }

  .m-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; letter-spacing: .01em; }
  .tag-plan { background: var(--c-bg); color: var(--c-text-2); }
  .tag-date { background: var(--c-orange-light); color: var(--c-orange); }
  .tag-date.warn { background: var(--c-warn-light); color: var(--c-warn); }
  .tag-inv { background: var(--c-green-light); color: var(--c-green); }

  .m-value { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: var(--radius-s); margin-bottom: 16px; font-size: 12px; font-weight: 500; border: 1px solid; }
  .t-default .m-value { background: var(--c-brand-light); color: var(--c-brand); border-color: var(--c-brand-border); }
  .t-ai .m-value { background: var(--c-ai-light); color: var(--c-ai); border-color: var(--c-ai-border); }
  .t-sec .m-value { background: var(--c-sec-light); color: var(--c-sec); border-color: var(--c-sec-border); }

function goStep(n) {
  step = n;
  const mw = $('mWrap'), cw = $('cfWrap'), f1 = $('fs1'), f2 = $('fs2');
  if (n === 1) {
    mw.classList.add('show'); cw.classList.remove('show');
    f1.className = 'flow-step current'; f2.className = 'flow-step';
  } else {
    mw.classList.remove('show'); cw.classList.add('show');
    f1.className = 'flow-step done'; f2.className = 'flow-step current';
    renderCf();
  }
  const ck = $('abCheck'); if (ck) { ck.checked = false; togAbandon(); }
}

  const rs = D.risks[S.theme];

  step = 1;
  const { type, days, theme, role } = S;

  const thCls = tc(theme);

  $('flow').className = (isAdminExp()) ? 'flow show' : 'flow';

  $('cfWrap').classList.remove('show');
  $('cmpWrap').classList.remove('show');

  $('bannerWrap').style.display = isBanner ? 'block' : 'none';
  const mw = $('mWrap');
  if (isBanner) { mw.classList.remove('show'); return; }
  mw.classList.add('show');

  // banner content (always update)
  const bnr = $('banner');
  bnr.className = `banner ${thCls}`;
  $('bannerBody').innerHTML = D.banner[theme](days);
  $('bannerCta').textContent = role === 'admin' ? '查看续费方案' : '通知管理员';

  // modal content
  const modal = $('modal');
  if (isAdminSoon()) {
    modal.className = `modal ${thCls}`;
    modal.innerHTML = buildAdminSoonHTML();
  } else if (isAdminExp()) {
    modal.className = `modal ${thCls} expired`;
    modal.innerHTML = buildAdminExpHTML();
  } else {
    modal.innerHTML = buildStandardHTML();
    populateStandard();
  }

  // days control opacity
  const dg = document.querySelector('[data-k="days"]');
  dg.style.opacity = isSoon() ? '1' : '.35';
  dg.style.pointerEvents = isSoon() ? 'auto' : 'none';
}

function togAbandon() {
  const b = $('abBtn');
  const hint = $('bufferHint');
  if ($('abCheck').checked) {
    b.disabled = false; b.classList.add('ok');
    if (hint) hint.classList.add('show');
  } else {
    b.disabled = true; b.classList.remove('ok');
    if (hint) hint.classList.remove('show');
  }
}

function $(id) { return document.getElementById(id); }

/* ── Event delegation ── */
document.addEventListener('click', e => {
  // Primary button
  const btnMain = e.target.closest('#btnMain');
  if (btnMain) {
    if (S.role === 'member') {
      const notifyOk = $('notifyOk');
      if (notifyOk) notifyOk.style.display = 'flex';
      const span = btnMain.querySelector('span');
      if (span) span.textContent = '已通知';
    }
  }
  // Remind / snooze → step 2 (expired only)
  const remindLink = e.target.closest('#remindLink');
  if (remindLink && isExp() && S.role === 'admin') {
    e.preventDefault();
    goStep(2);
  }
  const notRenewLink = e.target.closest('#notRenewLink');
  if (notRenewLink) {
    e.preventDefault();
    goStep(2);
  }
});

/* ── Seg controls ── */
document.querySelectorAll('.seg').forEach(g => {
  const k = g.dataset.k;
  g.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => {
      g.querySelectorAll('button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      S[k] = b.dataset.v;
      render();
    });
  });
});
